<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻 Simulator Pertumbuhan Bunga Matahari</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #1a5f2a 0%, #0d3b1a 100%);
        font-family: 'Poppins', sans-serif;
        padding: 20px;
        min-height: 100vh;
    }

    .main {
        max-width: 1200px;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
        color: #ffec80;
        text-shadow: 3px 3px 0 #b45f1b;
        margin-bottom: 20px;
        font-size: 1.8rem;
    }

    .card {
        background: rgba(255, 248, 225, 0.95);
        border-radius: 20px;
        padding: 16px 20px;
        margin: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        backdrop-filter: blur(4px);
    }

    .center {
        text-align: center;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 12px;
        margin: 16px 0;
    }

    label {
        font-weight: 600;
        color: #5a3a1a;
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        border-radius: 30px;
        border: 1px solid #d4a259;
        background: #fffae9;
        font-family: inherit;
    }

    input[type="range"] {
        padding: 0;
    }

    button {
        background: #f5b642;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        border-radius: 40px;
        font-weight: bold;
        font-family: inherit;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 3px 0 #a5661a;
    }

    button:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #a5661a;
    }

    .analysis-container {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin: 20px 0;
    }

    .analysis-box {
        flex: 1;
        background: #2c2b26;
        color: #f9eec1;
        border-radius: 20px;
        padding: 16px;
        min-width: 200px;
    }

    .analysis-box h3 {
        color: #ffcd7e;
        margin-bottom: 12px;
    }

    #chart {
        background: #fffef7;
        border-radius: 24px;
        padding: 12px;
        margin-top: 20px;
        max-height: 350px;
    }

    .stat-highlight {
        font-size: 1.5rem;
        font-weight: bold;
        color: #f5b642;
    }

    canvas#flowerCanvas {
        display: block;
        margin: 0 auto;
        background: #e9c891;
        border-radius: 60px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 380px;
        height: auto;
        cursor: pointer;
    }

    .flower-area {
        text-align: center;
        margin: 15px 0;
    }

    .badge {
        background: #f5b642;
        color: #2d2b1f;
        padding: 4px 12px;
        border-radius: 40px;
        display: inline-block;
        font-weight: bold;
    }

    @media (max-width: 700px) {
        .container {
            grid-template-columns: 1fr;
        }
        h1 {
            font-size: 1.3rem;
        }
    }
</style>
</head>

<body>
<div class="main">

<h1>🌻 Simulator Pertumbuhan Bunga Matahari</h1>

<div class="card center">
    🎮 Mode: 
    <select id="mode">
        <option value="normal">🌿 Normal</option>
        <option value="experiment">🧪 Eksperimen</option>
    </select>
    <span style="margin-left: 15px;" class="badge" id="modeBadge">Normal</span>
</div>

<div class="card center">
    📆 <strong>Hari:</strong> <span id="day">0</span> &nbsp;&nbsp;|&nbsp;&nbsp;
    📏 <strong>Tinggi:</strong> <span id="height">0.0</span> cm &nbsp;&nbsp;|&nbsp;&nbsp;
    🌱 <strong>Fase:</strong> <span id="phase">Dormancy</span>
</div>

<!-- Canvas untuk gambar bunga dinamis -->
<div class="flower-area">
    <canvas id="flowerCanvas" width="380" height="280" style="width:100%; max-width:380px; aspect-ratio:380/280"></canvas>
</div>

<div class="container">
    <div class="card"><label>💧 Air: <span id="waterVal">100</span> mm/hari</label><input id="water" type="range" min="0" max="200" value="100"></div>
    <div class="card"><label>☀️ Cahaya: <span id="lightVal">80</span> %</label><input id="light" type="range" min="0" max="100" value="80"></div>
    <div class="card"><label>🌡️ Suhu: <span id="tempVal">27</span> °C</label><input id="temp" type="range" min="10" max="40" value="27"></div>
    <div class="card"><label>⚗️ pH Tanah: <span id="phVal">6.5</span></label><input id="ph" type="range" min="3" max="9" step="0.1" value="6.5"></div>
    <div class="card"><label>💨 Kelembaban: <span id="humVal">60</span> %</label><input id="humidity" type="range" min="0" max="100" value="60"></div>
    <div class="card"><label>🧪 Pupuk: </label><select id="fertilizer"><option value="none">Tidak pakai</option><option value="npk">NPK</option><option value="organic">Organik</option></select></div>
    <div class="card"><label>⚖️ Dosis Pupuk: <span id="fertVal">50</span> %</label><input id="fertDose" type="range" min="0" max="100" value="50"></div>
    <div class="card"><label>🍂 Musim: </label><select id="season"><option value="optimal">Optimal</option><option value="kemarau">Kemarau</option><option value="hujan">Hujan</option></select></div>
</div>

<div class="card center">
    <button onclick="changeDay(-5)">⬅️ -5 Hari</button>
    <button onclick="changeDay(1)">🌱 +1 Hari</button>
    <button onclick="changeDay(5)">+5 Hari ➡️</button>
    <button onclick="changeDay(15)">🌻 +15 Hari</button>
</div>

<div class="card center">
    <button onclick="resetCurrentMode()">🔄 Reset Mode Ini</button>
    <button onclick="resetPreviousMode()">📁 Reset Mode Sebelumnya</button>
    <button onclick="resetAllModes()">⚠️ Reset Semua</button>
</div>

<div class="analysis-container">
    <div class="analysis-box"><h3>📊 Perlakuan</h3><div id="treatmentInfo">-</div></div>
    <div class="analysis-box"><h3>🌱 Respon Tanaman</h3><div id="plantInfo">-</div></div>
</div>

<canvas id="growthChart" width="800" height="300"></canvas>

</div>

<script>
    // ---------- STATE untuk 2 mode (Normal & Eksperimen) ----------
    let modes = {
        normal: { day: 0, height: 0.0, phase: "Dormancy", history: [0] },
        experiment: { day: 0, height: 0.0, phase: "Dormancy", history: [0] }
    };
    let currentMode = "normal";
    let growthChart = null;

    // Parameter environment (akan diupdate dari slider)
    let env = {
        water: 100,
        light: 80,
        temp: 27,
        ph: 6.5,
        humidity: 60,
        fertilizer: "none",
        fertDose: 50,
        season: "optimal"
    };

    const MAX_HEIGHT = 210;

    // Hubungkan slider + select ke variable env
    function bindInputs() {
        document.getElementById("water").addEventListener("input", (e) => { env.water = parseInt(e.target.value); document.getElementById("waterVal").innerText = env.water; updateUI(); });
        document.getElementById("light").addEventListener("input", (e) => { env.light = parseInt(e.target.value); document.getElementById("lightVal").innerText = env.light; updateUI(); });
        document.getElementById("temp").addEventListener("input", (e) => { env.temp = parseInt(e.target.value); document.getElementById("tempVal").innerText = env.temp; updateUI(); });
        document.getElementById("ph").addEventListener("input", (e) => { env.ph = parseFloat(e.target.value); document.getElementById("phVal").innerText = env.ph; updateUI(); });
        document.getElementById("humidity").addEventListener("input", (e) => { env.humidity = parseInt(e.target.value); document.getElementById("humVal").innerText = env.humidity; updateUI(); });
        document.getElementById("fertilizer").addEventListener("change", (e) => { env.fertilizer = e.target.value; updateUI(); });
        document.getElementById("fertDose").addEventListener("input", (e) => { env.fertDose = parseInt(e.target.value); document.getElementById("fertVal").innerText = env.fertDose; updateUI(); });
        document.getElementById("season").addEventListener("change", (e) => { env.season = e.target.value; updateUI(); });
        document.getElementById("mode").addEventListener("change", (e) => { currentMode = e.target.value; updateUI(); drawSunflower(); });
    }

    // Update fase berdasarkan tinggi
    function getPhaseFromHeight(h) {
        if (h < 0.5) return "Dormancy";
        if (h < 6) return "Germination";
        if (h < 25) return "Vegetative";
        if (h < 65) return "Budding";
        if (h < 130) return "Flowering";
        return "Reproductive";
    }

    // Hitung pertumbuhan harian
    function dailyGrowth(currentHeight, modeEnv) {
        if (currentHeight >= MAX_HEIGHT) return 0;
        let base = 0;
        let phaseNow = getPhaseFromHeight(currentHeight);
        switch(phaseNow) {
            case "Dormancy": base = 0.25; break;
            case "Germination": base = 1.0; break;
            case "Vegetative": base = 2.6; break;
            case "Budding": base = 3.2; break;
            case "Flowering": base = 2.2; break;
            case "Reproductive": base = 0.9; break;
            default: base = 1.2;
        }
        
        let waterFactor = (env.water >= 60 && env.water <= 170) ? 1.0 : (env.water < 40 ? 0.4 : (env.water > 220 ? 0.55 : 0.85));
        let lightFactor = (env.light >= 55 && env.light <= 90) ? 1.1 : (env.light < 25 ? 0.3 : 0.8);
        let tempFactor = (env.temp >= 18 && env.temp <= 30) ? 1.0 : (env.temp < 12 ? 0.35 : 0.7);
        let phFactor = (env.ph >= 6.0 && env.ph <= 7.5) ? 1.05 : (env.ph < 5 ? 0.5 : 0.85);
        let humFactor = (env.humidity >= 50 && env.humidity <= 80) ? 1.0 : 0.75;
        
        let fertBonus = 1.0;
        if (env.fertilizer === "npk") fertBonus = 1 + (env.fertDose / 100) * 0.35;
        else if (env.fertilizer === "organic") fertBonus = 1 + (env.fertDose / 100) * 0.25;
        
        let seasonFactor = 1.0;
        if (env.season === "kemarau") seasonFactor = 0.7;
        else if (env.season === "hujan") seasonFactor = 0.85;
        
        let growth = base * waterFactor * lightFactor * tempFactor * phFactor * humFactor * fertBonus * seasonFactor;
        growth = Math.min(6.0, Math.max(0.1, growth));
        if (currentHeight + growth > MAX_HEIGHT) growth = MAX_HEIGHT - currentHeight;
        return parseFloat(growth.toFixed(2));
    }

    // Majukan hari
    function advanceDays(delta) {
        let state = modes[currentMode];
        if (delta <= 0 && delta < 0) {
            // mundur tidak diizinkan terlalu ekstrim, minimal hari 0
            let newDay = Math.max(0, state.day + delta);
            if (newDay < state.day) {
                alert("Tidak bisa mundur ke masa lalu! Silakan reset jika ingin mengulang.");
                return;
            }
        }
        for(let i=0; i<Math.abs(delta); i++) {
            if (delta < 0) break;
            if (state.height >= MAX_HEIGHT) {
                state.day++;
                state.history.push(state.height);
                continue;
            }
            let inc = dailyGrowth(state.height, env);
            state.height = parseFloat((state.height + inc).toFixed(2));
            if(state.height > MAX_HEIGHT) state.height = MAX_HEIGHT;
            state.phase = getPhaseFromHeight(state.height);
            state.day++;
            state.history.push(state.height);
            if(state.history.length > 400) state.history.shift();
        }
        updateUI();
        drawSunflower();
        updateChart();
    }

    // Reset mode saat ini
    function resetCurrentMode() {
        modes[currentMode] = { day: 0, height: 0.0, phase: "Dormancy", history: [0] };
        updateUI();
        drawSunflower();
        updateChart();
    }
    
    function resetPreviousMode() {
        let prev = currentMode === "normal" ? "experiment" : "normal";
        modes[prev] = { day: 0, height: 0.0, phase: "Dormancy", history: [0] };
        if(currentMode === prev) updateUI();
        updateChart();
    }
    
    function resetAllModes() {
        modes.normal = { day: 0, height: 0.0, phase: "Dormancy", history: [0] };
        modes.experiment = { day: 0, height: 0.0, phase: "Dormancy", history: [0] };
        updateUI();
        drawSunflower();
        updateChart();
    }

    function changeDay(delta) {
        if (delta > 0) advanceDays(delta);
        else if (delta < 0) {
            if(confirm("Mundur hari akan menghilangkan pertumbuhan? Sebaiknya pakai reset.")) return;
            else advanceDays(delta);
        }
    }

    // Update tampilan angka & analisis
    function updateUI() {
        let s = modes[currentMode];
        document.getElementById("day").innerText = s.day;
        document.getElementById("height").innerText = s.height.toFixed(1);
        document.getElementById("phase").innerText = s.phase;
        document.getElementById("modeBadge").innerHTML = currentMode === "normal" ? "🌿 Normal" : "🧪 Eksperimen";
        
        let treatment = `💧 Air ${env.water} mm | ☀️ ${env.light}% | 🌡️ ${env.temp}°C | pH ${env.ph} | 💨 Kelembaban ${env.humidity}%<br>🧪 Pupuk: ${env.fertilizer} (${env.fertDose}%) | 🍂 Musim: ${env.season}`;
        document.getElementById("treatmentInfo").innerHTML = treatment;
        
        let health = "🌱 Baik";
        if (env.water < 30 || env.light < 20 || env.temp > 38) health = "⚠️ Stres";
        if (s.height > 130) health = "🌻 Berbunga indah!";
        let response = `📈 Laju tumbuh: ${dailyGrowth(s.height, env).toFixed(2)} cm/hari<br>❤️ Kondisi: ${health}<br>📏 Tinggi akhir target: ${((s.height/MAX_HEIGHT)*100).toFixed(0)}% dari maksimal`;
        document.getElementById("plantInfo").innerHTML = response;
    }
    
    // Gambar bunga dinamis di Canvas berdasarkan fase & tinggi
    function drawSunflower() {
        let canvas = document.getElementById("flowerCanvas");
        let ctx = canvas.getContext("2d");
        let w = canvas.width = 380;
        let h = canvas.height = 280;
        ctx.clearRect(0,0,w,h);
        
        let state = modes[currentMode];
        let heightPercent = Math.min(1.0, state.height / MAX_HEIGHT);
        let stemHeight = 28 + heightPercent * 155;
        stemHeight = Math.min(180, Math.max(18, stemHeight));
        let groundY = h-32;
        let stemTopY = groundY - stemHeight;
        let stemX = w/2;
        
        // Tanah
        ctx.fillStyle = "#a47242";
        ctx.fillRect(0, groundY-6, w, 38);
        ctx.fillStyle = "#c2894a";
        for (let i=0;i<12;i++) ctx.fillRect(i*35, groundY-8, 20, 6);
        
        // Batang
        ctx.fillStyle = "#558b2f";
        ctx.fillRect(stemX-4, stemTopY, 8, stemHeight);
        
        // Daun
        if(state.height >= 7){
            ctx.fillStyle = "#6aab3a";
            ctx.beginPath(); ctx.ellipse(stemX-14, stemTopY+stemHeight*0.45, 13, 7, -0.7, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(stemX+14, stemTopY+stemHeight*0.6, 13, 7, 0.7, 0, Math.PI*2); ctx.fill();
        }
        if(state.height >= 20){
            ctx.fillStyle = "#5f9e34";
            ctx.beginPath(); ctx.ellipse(stemX-16, stemTopY+stemHeight*0.25, 11, 6, -0.9, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(stemX+15, stemTopY+stemHeight*0.35, 11, 6, 0.8, 0, Math.PI*2); ctx.fill();
        }
        
        // Kepala bunga tergantung fase
        let headSize = 12;
        let phaseName = state.phase;
        if(phaseName === "Dormancy") headSize = 7;
        else if(phaseName === "Germination") headSize = 12;
        else if(phaseName === "Vegetative") headSize = 18;
        else if(phaseName === "Budding") headSize = 26;
        else if(phaseName === "Flowering") headSize = 36;
        else headSize = 40;
        
        if(state.height >= 2.5){
            ctx.fillStyle = "#f3bc4c";
            ctx.beginPath(); ctx.arc(stemX, stemTopY-4, headSize, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#e0a42c";
            for(let a=0;a<12;a++){ let ang = a*Math.PI*2/12; let px = stemX+Math.cos(ang)*(headSize-4); let py = stemTopY-4+Math.sin(ang)*(headSize-4); ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();}
            ctx.fillStyle = "#7a521f";
            ctx.beginPath(); ctx.arc(stemX, stemTopY-4, headSize*0.4, 0, Math.PI*2); ctx.fill();
            if(phaseName === "Flowering" || phaseName === "Reproductive"){
                ctx.fillStyle = "#cf9f3a";
                for(let p=0;p<10;p++){ let angleP = p*Math.PI*2/10; let px = stemX+Math.cos(angleP)*(headSize-3); let py = stemTopY-4+Math.sin(angleP)*(headSize-3); ctx.beginPath(); ctx.ellipse(px,py,7,4,angleP,0,Math.PI*2); ctx.fill();}
            }
        } else {
            ctx.fillStyle = "#a5672e";
            ctx.beginPath(); ctx.ellipse(stemX, groundY-12, 10, 5, 0, 0, Math.PI*2); ctx.fill();
        }
    }
    
    // Chart.js untuk grafik pertumbuhan
    function updateChart() {
        let normalHist = modes.normal.history.slice(-60);
        let expHist = modes.experiment.history.slice(-60);
        let labels = normalHist.map((_, idx) => idx);
        
        if(growthChart) growthChart.destroy();
        let ctx = document.getElementById("growthChart").getContext("2d");
        growthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '🌿 Normal Mode', data: normalHist, borderColor: '#4caf50', backgroundColor: 'rgba(76,175,80,0.1)', tension: 0.3, fill: true },
                    { label: '🧪 Eksperimen Mode', data: expHist, borderColor: '#ff9800', backgroundColor: 'rgba(255,152,0,0.05)', tension: 0.3, fill: true }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw} cm` } } },
                scales: { y: { title: { display: true, text: 'Tinggi (cm)' }, beginAtZero: true, max: MAX_HEIGHT } }
            }
        });
    }
    
    // inisialisasi
    window.onload = () => {
        bindInputs();
        updateUI();
        drawSunflower();
        updateChart();
        setInterval(() => { updateUI(); drawSunflower(); }, 300);
    };
    
    window.changeDay = changeDay;
    window.resetCurrentMode = resetCurrentMode;
    window.resetPreviousMode = resetPreviousMode;
    window.resetAllModes = resetAllModes;
</script>
</body>
</html>
