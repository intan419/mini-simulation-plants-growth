<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻 Simulator Pertumbuhan Bunga Matahari | Realistic Growth & Death</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #1a5f2a 0%, #0d3b1a 100%);
        font-family: 'Poppins', sans-serif;
        padding: 20px;
        min-height: 100vh;
    }

    .main {
        max-width: 1200px;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
        color: #ffec80;
        text-shadow: 3px 3px 0 #b45f1b;
        margin-bottom: 20px;
        font-size: 1.8rem;
    }

    .card {
        background: rgba(255, 248, 225, 0.95);
        border-radius: 20px;
        padding: 16px 20px;
        margin: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        backdrop-filter: blur(4px);
    }

    .center {
        text-align: center;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
        margin: 16px 0;
    }

    label {
        font-weight: 600;
        color: #5a3a1a;
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        border-radius: 30px;
        border: 1px solid #d4a259;
        background: #fffae9;
        font-family: inherit;
    }

    input[type="range"] {
        padding: 0;
    }

    button {
        background: #f5b642;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        border-radius: 40px;
        font-weight: bold;
        font-family: inherit;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 3px 0 #a5661a;
    }

    button:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #a5661a;
    }

    .analysis-container {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin: 20px 0;
    }

    .analysis-box {
        flex: 1;
        background: #2c2b26;
        color: #f9eec1;
        border-radius: 20px;
        padding: 16px;
        min-width: 200px;
    }

    .analysis-box h3 {
        color: #ffcd7e;
        margin-bottom: 12px;
    }

    .flower-area {
        text-align: center;
        margin: 15px 0;
        position: relative;
    }

    #plantImg {
        width: 100%;
        max-width: 320px;
        height: auto;
        margin: 0 auto;
        display: block;
        filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
        transition: all 0.3s ease;
    }

    .badge {
        background: #f5b642;
        color: #2d2b1f;
        padding: 4px 12px;
        border-radius: 40px;
        display: inline-block;
        font-weight: bold;
    }

    .status-alert {
        background: #c7254e;
        color: white;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
        animation: pulse 1s infinite;
    }

    .status-warning {
        background: #e67e22;
        color: white;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
    }

    .status-dead {
        background: #5a2a1a;
        color: #ddd;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
    }

    @media (max-width: 700px) {
        .container {
            grid-template-columns: 1fr;
        }
        h1 {
            font-size: 1.3rem;
        }
    }

    .stress-indicator {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 10px;
        flex-wrap: wrap;
    }

    .stress-tag {
        background: #c0392b;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: bold;
    }

    #growthChart {
        background: #fffef7;
        border-radius: 24px;
        padding: 12px;
        margin-top: 20px;
        max-height: 350px;
    }

    .death-explanation {
        font-size: 12px;
        color: #ffaa88;
        margin-top: 8px;
        padding: 8px;
        background: rgba(0,0,0,0.3);
        border-radius: 12px;
    }
</style>
</head>

<body>
<div class="main">

<h1>🌻 Simulator Pertumbuhan Bunga Matahari</h1>
<h3 style="text-align:center; color:#ffec80; margin-top:-10px; margin-bottom:15px;">🌱 Berbasis Data Agronomi Realistis 🌱</h3>

<div class="card center">
    🎮 Mode: 
    <select id="mode">
        <option value="normal">🌿 Normal (Parameter Optimal)</option>
        <option value="experiment">🧪 Eksperimen</option>
    </select>
    <span style="margin-left: 15px;" class="badge" id="modeBadge">Normal</span>
</div>

<div class="card center" id="statusCard">
    📆 <strong>Hari ke-:</strong> <span id="day">0</span> &nbsp;&nbsp;|&nbsp;&nbsp;
    📏 <strong>Tinggi:</strong> <span id="height">0.0</span> cm &nbsp;&nbsp;|&nbsp;&nbsp;
    🌱 <strong>Fase:</strong> <span id="phase">Dormancy</span>
    <br><br>
    <span id="healthStatus" class="badge">❤️ Sehat</span>
</div>

<!-- Gambar bunga sesuai fase -->
<div class="flower-area">
    <img id="plantImg" src="assets/seed.png" alt="Bunga Matahari">
</div>

<!-- Stress indicator -->
<div class="stress-indicator" id="stressList"></div>

<div class="container">
    <div class="card"><label>💧 Air: <span id="waterVal">100</span> mm/hari</label><input id="water" type="range" min="0" max="200" value="100"></div>
    <div class="card"><label>☀️ Cahaya: <span id="lightVal">80</span> %</label><input id="light" type="range" min="0" max="100" value="80"></div>
    <div class="card"><label>🌡️ Suhu: <span id="tempVal">27</span> °C</label><input id="temp" type="range" min="10" max="40" value="27"></div>
    <div class="card"><label>⚗️ pH Tanah: <span id="phVal">6.5</span></label><input id="ph" type="range" min="3" max="9" step="0.1" value="6.5"></div>
    <div class="card"><label>💨 Kelembaban Udara: <span id="humVal">60</span> %</label><input id="humidity" type="range" min="0" max="100" value="60"></div>
    <div class="card"><label>🧪 Pupuk: </label><select id="fertilizer"><option value="none">Tidak pakai</option><option value="npk">NPK (Nitrogen-Phosphorus-Kalium)</option><option value="organic">Organik (Kompos/Pupuk Kandang)</option></select></div>
    <div class="card"><label>⚖️ Dosis Pupuk: <span id="fertVal">50</span> %</label><input id="fertDose" type="range" min="0" max="100" value="50"></div>
    <div class="card"><label>🍂 Musim: </label><select id="season"><option value="optimal">Optimal (Musim Tanam)</option><option value="kemarau">Kemarau</option><option value="hujan">Hujan</option></select></div>
</div>

<div class="card center">
    <button onclick="changeDay(-5)">⬅️ -5 Hari</button>
    <button onclick="changeDay(1)">🌱 +1 Hari</button>
    <button onclick="changeDay(5)">+5 Hari ➡️</button>
    <button onclick="changeDay(15)">🌻 +15 Hari</button>
</div>

<div class="card center">
    <button onclick="resetCurrentMode()">🔄 Reset Mode Ini</button>
    <button onclick="resetPreviousMode()">📁 Reset Mode Sebelumnya</button>
    <button onclick="resetAllModes()">⚠️ Reset Semua</button>
</div>

<div class="analysis-container">
    <div class="analysis-box"><h3>📊 Perlakuan & Kondisi</h3><div id="treatmentInfo">-</div></div>
    <div class="analysis-box"><h3>🌱 Respon & Analisis Tanaman</h3><div id="plantInfo">-</div></div>
</div>

<canvas id="growthChart" width="800" height="300"></canvas>

</div>

<script>
    // ========== STATE UNTUK 2 MODE ==========
    let modes = {
        normal: { day: 0, height: 0, history: [0], isDead: false, wiltLevel: 0, deadCause: null, deathType: null },
        experiment: { day: 0, height: 0, history: [0], isDead: false, wiltLevel: 0, deadCause: null, deathType: null }
    };
    let currentMode = "normal";
    let growthChart = null;

    // Parameter environment
    let env = {
        water: 100, light: 80, temp: 27, ph: 6.5, humidity: 60,
        fertilizer: "npk", fertDose: 50, season: "optimal"
    };

    const MAX_HEIGHT = 250;

    // ========== TABEL FASE REAL BUNGA MATAHARI ==========
    // Fase: Dormancy (0-5hr, 0cm), Germination (5-10hr, 1-3cm), Seedling (10-20hr, 5-15cm)
    // Early Vegetative (20-40hr, 20-80cm), Late Vegetative (40-60hr, 80-150cm)
    // Flowering/Anthesis (60-75hr, 150-220cm), Seed Maturation (75-90hr, 200-250cm)
    // Senescence (90+hr, tinggi menurun)
    
    function getTargetHeight(day) {
        if (day <= 0) return 0;
        if (day <= 5) return 0; // Dormancy
        if (day <= 10) return 1 + (day - 5) * 0.4; // Germination: 1-3cm
        if (day <= 20) return 3 + (day - 10) * 1.2; // Seedling: 3-15cm
        if (day <= 40) return 15 + (day - 20) * 3.25; // Early Veg: 15-80cm
        if (day <= 60) return 80 + (day - 40) * 3.5; // Late Veg: 80-150cm
        if (day <= 75) return 150 + (day - 60) * 4.67; // Flowering: 150-220cm
        if (day <= 90) return 220 + (day - 75) * 2; // Seed Maturation: 220-250cm
        // Senescence: turun perlahan
        return Math.max(0, 250 - (day - 90) * 3);
    }

    function getPhaseByDay(day, height, isDead) {
        if (isDead) return { name: "🌿 Senescence (Kematian)", img: "assets/wilt.png" };
        if (day <= 5) return { name: "🌰 Dormancy (Biji Dormant)", img: "assets/seed.png" };
        if (day <= 10) return { name: "🌱 Germination (Perkecambahan)", img: "assets/sprout.png" };
        if (day <= 20) return { name: "🌿 Seedling (Bibit)", img: "assets/small.png" };
        if (day <= 40) return { name: "🍃 Early Vegetative (Vegetatif Awal)", img: "assets/medium.png" };
        if (day <= 60) return { name: "🌳 Late Vegetative (Vegetatif Akhir)", img: "assets/medium.png" };
        if (day <= 75) return { name: "🌻 Flowering / Anthesis (Pembungaan)", img: "assets/flower.png" };
        if (day <= 90) return { name: "🌾 Seed Maturation (Pematangan Biji)", img: "assets/bloom.png" };
        return { name: "🍂 Senescence (Penuaan & Layu)", img: "assets/wilt.png" };
    }

    // ========== FUNGSI DETEKSI PENYEBAB STRES & KEMATIAN ==========
    function analyzeDeathCause() {
        let causes = [];
        let deathType = null;
        let isGerminationFailed = modes[currentMode].day <= 10 && modes[currentMode].height < 1;
        
        // 1. GAGAL BERKECAMBAH (biji tidak tumbuh)
        if (isGerminationFailed && modes[currentMode].day >= 10 && modes[currentMode].height < 1) {
            deathType = "germination_failed";
            causes.push("🌱 GAGAL BERKECAMBAH: Biji tidak berkecambah karena kondisi lingkungan tidak mendukung.");
            causes.push("📖 Penjelasan Ilmiah: Perkecambahan memerlukan suhu optimal 20-30°C, kelembaban 60-80%, dan aerasi tanah yang baik. Kegagalan dapat disebabkan oleh suhu ekstrem, kekeringan, atau tanah terlalu padat.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        // 2. KEKERINGAN (Air terlalu sedikit)
        if (env.water < 35) {
            deathType = "drought";
            causes.push(`💧 KEKERINGAN EKSTRIM: Curah air hanya ${env.water} mm/hari (ideal 80-120 mm/hari).`);
            causes.push("📖 Penjelasan Ilmiah: Defisit air menyebabkan penutupan stomata, penurunan laju fotosintesis, dan akhirnya kematian sel akibat plasmolisis. Tanaman bunga matahari sangat sensitif terhadap kekeringan pada fase vegetatif dan pembungaan.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        // 3. KELEBIHAN AIR (Genangan)
        if (env.water > 170) {
            deathType = "waterlogging";
            causes.push(`💧 KELEBIHAN AIR / GENANGAN: Curah air ${env.water} mm/hari (ideal 80-120 mm/hari).`);
            causes.push("📖 Penjelasan Ilmiah: Genangan air menyebabkan hipoksia (kekurangan oksigen) pada zona perakaran, mengganggu respirasi akar, memicu pertumbuhan patogen seperti Phytophthora, dan menyebabkan busuk akar.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        // 4. KEKURANGAN CAHAYA
        if (env.light < 25) {
            deathType = "low_light";
            causes.push(`☀️ KEKURANGAN CAHAYA MATAHARI: Intensitas hanya ${env.light}% (ideal 70-90%).`);
            causes.push("📖 Penjelasan Ilmiah: Cahaya merupakan sumber energi untuk fotosintesis. Kekurangan cahaya menyebabkan etiolasi (batang memanjang tidak normal), klorosis (daun pucat), dan penurunan produksi karbohidrat. Tanaman akhirnya mati karena kelaparan.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        // 5. SUHU EKSTRIM
        if (env.temp < 12) {
            deathType = "cold_stress";
            causes.push(`🌡️ SUHU TERLALU RENDAH: ${env.temp}°C (ideal 22-30°C).`);
            causes.push("📖 Penjelasan Ilmiah: Suhu rendah menyebabkan kerusakan membran sel, menghambat enzim metabolisme, dan mengganggu transport air. Bunga matahari berasal dari daerah tropis-subtropis dan tidak tahan terhadap suhu di bawah 12°C.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        if (env.temp > 37) {
            deathType = "heat_stress";
            causes.push(`🌡️ SUHU TERLALU TINGGI: ${env.temp}°C (ideal 22-30°C).`);
            causes.push("📖 Penjelasan Ilmiah: Stres panas menyebabkan denaturasi protein, peningkatan transpirasi berlebihan, dan penutupan stomata yang berkepanjangan. Bunga matahari dapat mengalami sunscald (luka bakar pada batang dan bunga).");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        // 6. pH TANAH TIDAK SESUAI
        if (env.ph < 5.0 || env.ph > 8.0) {
            deathType = "ph_extreme";
            causes.push(`⚗️ pH TANAH EKSTRIM: ${env.ph} (ideal 6.0-7.5).`);
            causes.push("📖 Penjelasan Ilmiah: pH ekstrem mengganggu ketersediaan hara. pH <5 menyebabkan toksisitas Aluminium dan Mangan, menghambat pertumbuhan akar. pH >8 menyebabkan presipitasi (pengendapan) Fosfor, Fe, dan unsur mikro lainnya.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        // 7. KELEMBABAN TIDAK SESUAI
        if (env.humidity < 25) {
            deathType = "low_humidity";
            causes.push(`💨 KELEMBABAN UDARA TERLALU RENDAH: ${env.humidity}% (ideal 40-70%).`);
            causes.push("📖 Penjelasan Ilmiah: Kelembaban rendah meningkatkan laju transpirasi melebihi kapasitas absorpsi air oleh akar, menyebabkan kekurangan air internal, layu permanen, dan kematian sel jaringan daun.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        if (env.humidity > 85) {
            deathType = "high_humidity";
            causes.push(`💨 KELEMBABAN UDARA TERLALU TINGGI: ${env.humidity}% (ideal 40-70%).`);
            causes.push("📖 Penjelasan Ilmiah: Kelembaban tinggi menciptakan lingkungan ideal untuk perkembangan jamur patogen seperti Sclerotinia sclerotiorum (busuk putih) dan Alternaria (bercak daun). Juga menghambat transpirasi dan transportasi hara.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        // 8. OVERDOSIS PUPUK
        if (env.fertilizer !== "none" && env.fertDose > 85) {
            deathType = "fertilizer_burn";
            causes.push(`🧪 OVERDOSIS PUPUK: Dosis ${env.fertDose}% (ideal 40-70%). Jenis: ${env.fertilizer === "npk" ? "NPK" : "Organik"}.`);
            causes.push("📖 Penjelasan Ilmiah: Kelebihan pupuk menyebabkan peningkatan salinitas tanah (salt burn), mengganggu potensial osmotik air, dan merusak akar karena akumulasi garam. Daun menunjukkan gejala terbakar pada tepi daun (leaf scorch).");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        // 9. USIA TUA (Senescence alami)
        if (modes[currentMode].day > 100 && modes[currentMode].height < 15) {
            deathType = "old_age";
            causes.push(`🍂 SENESCENCE (PENUAAN ALAMI): Tanaman telah menyelesaikan siklus hidupnya pada hari ke-${modes[currentMode].day}.`);
            causes.push("📖 Penjelasan Ilmiah: Bunga matahari adalah tanaman semusim (annual). Setelah pembentukan biji, tanaman memasuki fase senescence yang ditandai dengan degradasi klorofil, translokasi hara ke biji, dan akhirnya kematian alami. Tinggi maksimal 250 cm dicapai pada hari ke-90.");
            return { deathType, fullExplanation: causes.join(" ") };
        }
        
        return { deathType: null, fullExplanation: null };
    }

    // Hitung stres & faktor pertumbuhan
    function calculateStressAndGrowth() {
        let stressLevel = 0;
        
        // Faktor air
        if (env.water < 50) stressLevel += 35;
        else if (env.water < 70) stressLevel += 15;
        else if (env.water > 150) stressLevel += 25;
        else if (env.water > 130) stressLevel += 10;
        
        // Faktor cahaya
        if (env.light < 40) stressLevel += 30;
        else if (env.light < 60) stressLevel += 15;
        else if (env.light > 92) stressLevel += 10;
        
        // Faktor suhu
        if (env.temp < 16) stressLevel += 30;
        else if (env.temp < 20) stressLevel += 15;
        else if (env.temp > 34) stressLevel += 25;
        else if (env.temp > 31) stressLevel += 10;
        
        // Faktor pH
        if (env.ph < 5.5 || env.ph > 7.8) stressLevel += 25;
        else if (env.ph < 6 || env.ph > 7.5) stressLevel += 10;
        
        // Faktor kelembaban
        if (env.humidity < 30) stressLevel += 20;
        else if (env.humidity > 80) stressLevel += 15;
        
        // Faktor pupuk
        if (env.fertilizer !== "none" && env.fertDose > 75) stressLevel += 20;
        else if (env.fertilizer !== "none" && env.fertDose > 60) stressLevel += 8;
        else if (env.fertilizer === "none") stressLevel += 15;
        
        // Faktor musim
        if (env.season === "kemarau" && env.water < 70) stressLevel += 15;
        if (env.season === "hujan" && env.water > 140) stressLevel += 10;
        
        return Math.min(100, stressLevel);
    }

    function getGrowthFactor(state) {
        if (state.isDead) return 0;
        
        let stress = calculateStressAndGrowth();
        let wiltPenalty = 1 - (state.wiltLevel || 0) / 100;
        
        // Faktor optimal masing-masing
        let waterFactor = (env.water >= 70 && env.water <= 130) ? 1 : (env.water < 40 ? 0.3 : (env.water > 160 ? 0.45 : 0.7));
        let lightFactor = (env.light >= 60 && env.light <= 90) ? 1 : (env.light < 35 ? 0.3 : 0.7);
        let tempFactor = (env.temp >= 20 && env.temp <= 30) ? 1 : (env.temp < 15 ? 0.3 : (env.temp > 35 ? 0.35 : 0.65));
        let phFactor = (env.ph >= 6 && env.ph <= 7.5) ? 1 : (env.ph < 5.2 ? 0.3 : (env.ph > 8 ? 0.35 : 0.65));
        let humFactor = (env.humidity >= 45 && env.humidity <= 75) ? 1 : (env.humidity < 30 ? 0.4 : 0.7);
        
        let fertFactor = 1;
        if (env.fertilizer === "npk") fertFactor = 1 + (env.fertDose / 100) * 0.45;
        else if (env.fertilizer === "organic") fertFactor = 1 + (env.fertDose / 100) * 0.3;
        else fertFactor = 0.75;
        fertFactor = Math.min(1.25, Math.max(0.65, fertFactor));
        
        let seasonFactor = (env.season === "optimal") ? 1 : (env.season === "kemarau" ? 0.7 : 0.85);
        
        // Hukum Minimum Liebig
        let factors = [waterFactor, lightFactor, tempFactor, phFactor, humFactor];
        let limitingFactor = Math.min(...factors);
        
        let total = limitingFactor * fertFactor * seasonFactor * wiltPenalty;
        
        // Stres mengurangi pertumbuhan
        if (stress > 60) total *= 0.4;
        else if (stress > 40) total *= 0.65;
        else if (stress > 20) total *= 0.85;
        
        return Math.min(1.2, Math.max(0.05, total));
    }

    function updateWiltAndDeath(state) {
        if (state.isDead) return "dead";
        
        let stress = calculateStressAndGrowth();
        let currentWilt = state.wiltLevel || 0;
        
        // Cek penyebab kematian
        let deathAnalysis = analyzeDeathCause();
        
        if (deathAnalysis.deathType !== null) {
            state.isDead = true;
            state.wiltLevel = 100;
            state.deadCause = deathAnalysis.fullExplanation;
            state.deathType = deathAnalysis.deathType;
            return "dead";
        }
        
        // Update layu berdasarkan stres
        if (stress > 75) {
            state.wiltLevel = Math.min(100, currentWilt + 7);
            if (state.wiltLevel >= 90) {
                state.isDead = true;
                state.deadCause = "Stres lingkungan berkepanjangan - kombinasi faktor tidak optimal.";
                return "dead";
            }
        } else if (stress > 55) {
            state.wiltLevel = Math.min(90, currentWilt + 4);
        } else if (stress > 35) {
            state.wiltLevel = Math.min(75, currentWilt + 2);
        } else {
            state.wiltLevel = Math.max(0, currentWilt - 2);
        }
        
        return state.wiltLevel > 70 ? "heavy_wilt" : (state.wiltLevel > 35 ? "light_wilt" : "healthy");
    }

    // Pertumbuhan harian
    function dailyGrowth(state) {
        if (state.isDead) return 0;
        if (state.height >= MAX_HEIGHT) return 0;
        
        let target = getTargetHeight(state.day + 1);
        let current = state.height;
        let factor = getGrowthFactor(state);
        
        let diff = Math.max(0, target - current);
        let growth = diff * 0.3 * factor;
        
        // Batasan pertumbuhan per hari sesuai fase
        let maxGrowth = 6.5;
        if (state.day < 20) maxGrowth = 2.5;
        else if (state.day < 40) maxGrowth = 5;
        
        growth = Math.min(maxGrowth, Math.max(0, growth));
        
        return parseFloat(growth.toFixed(2));
    }

    // Senescence setelah 90 hari
    function applySenescence(state) {
        if (state.isDead) return;
        if (state.day > 90) {
            let reduction = (state.day - 90) * 1.35;
            state.height = Math.max(0, state.height - reduction);
        }
        if (state.height <= 1 && state.day > 95) {
            state.isDead = true;
            state.deadCause = "🍂 Senescence alami: Tanaman menyelesaikan siklus hidupnya setelah masa pembungaan dan pembentukan biji.";
            state.deathType = "old_age";
        }
    }

    function advanceDays(delta) {
        if (delta < 0) {
            alert("⚠️ Tidak bisa mundur ke masa lalu! Gunakan tombol Reset.");
            return;
        }
        
        let state = modes[currentMode];
        
        for (let i = 0; i < delta; i++) {
            if (state.isDead) {
                state.day++;
                state.history.push(state.height);
                continue;
            }
            
            let growth = dailyGrowth(state);
            state.height = parseFloat((state.height + growth).toFixed(2));
            if (state.height > MAX_HEIGHT) state.height = MAX_HEIGHT;
            
            state.day++;
            
            updateWiltAndDeath(state);
            applySenescence(state);
            
            state.history.push(state.height);
            if (state.history.length > 200) state.history.shift();
        }
        
        updateUI();
        updateChart();
    }

    // RESET FUNCTIONS
    function resetCurrentMode() {
        modes[currentMode] = { 
            day: 0, height: 0, history: [0], isDead: false, 
            wiltLevel: 0, deadCause: null, deathType: null 
        };
        updateUI();
        updateChart();
    }
    
    function resetPreviousMode() {
        let prev = currentMode === "normal" ? "experiment" : "normal";
        modes[prev] = { 
            day: 0, height: 0, history: [0], isDead: false, 
            wiltLevel: 0, deadCause: null, deathType: null 
        };
        updateChart();
        if (currentMode === prev) updateUI();
    }
    
    function resetAllModes() {
        modes.normal = { day: 0, height: 0, history: [0], isDead: false, wiltLevel: 0, deadCause: null, deathType: null };
        modes.experiment = { day: 0, height: 0, history: [0], isDead: false, wiltLevel: 0, deadCause: null, deathType: null };
        updateUI();
        updateChart();
    }

    function changeDay(delta) {
        if (delta > 0) advanceDays(delta);
        else if (delta < 0 && confirm("⚠️ Hari tidak bisa mundur. Gunakan Reset Mode untuk memulai ulang.")) {}
    }
