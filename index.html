<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻 Simulator Pertumbuhan Bunga Matahari</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="main">

<h1>🌻 Simulator Pertumbuhan Bunga Matahari</h1>

<div class="card-center">
    <label>Mode:</label>
    <select id="mode">
        <option value="normal">🌿 Normal (Optimal)</option>
        <option value="experiment">🧪 Eksperimen</option>
    </select>
</div>

<div class="card-center">
    <div>📅 Hari: <span id="day">0</span></div>
    <div>📏 Tinggi: <span id="height">0</span> cm</div>
    <div>🌱 Fase: <span id="phase">Dormancy</span></div>
</div>

<!-- Animasi Tanaman -->
<div class="plant-garden">
    <div class="sky"></div>
    <div class="ground"></div>
    <div id="plantEmoji" class="plant-emoji">🌰</div>
</div>

<!-- Sliders & Controls -->
<div class="sliders-container">
    <div class="card">
        <label>💧 Air: <span id="waterVal">100</span> mm/hari</label>
        <input type="range" id="water" min="0" max="200" value="100">
    </div>
    <div class="card">
        <label>☀️ Cahaya: <span id="lightVal">80</span> %</label>
        <input type="range" id="light" min="0" max="100" value="80">
    </div>
    <div class="card">
        <label>🌡️ Suhu: <span id="tempVal">27</span> °C</label>
        <input type="range" id="temp" min="10" max="40" value="27">
    </div>
    <div class="card">
        <label>🧪 pH Tanah: <span id="phVal">6.5</span></label>
        <input type="range" id="ph" min="3" max="9" step="0.1" value="6.5">
    </div>
    <div class="card">
        <label>💨 Kelembaban: <span id="humVal">60</span> %</label>
        <input type="range" id="humidity" min="0" max="100" value="60">
    </div>
    <div class="card">
        <label>🌾 Pupuk:</label>
        <select id="fertilizer">
            <option value="none">Tidak pakai</option>
            <option value="npk" selected>NPK</option>
            <option value="organic">Organik</option>
        </select>
    </div>
    <div class="card">
        <label>📊 Dosis Pupuk: <span id="fertVal">50</span> %</label>
        <input type="range" id="fertDose" min="0" max="100" value="50">
    </div>
    <div class="card">
        <label>🍂 Musim:</label>
        <select id="season">
            <option value="optimal">Optimal</option>
            <option value="kemarau">Kemarau</option>
            <option value="hujan">Hujan</option>
        </select>
    </div>
</div>

<div class="card-center">
    <button id="prevBtn">◀ -5 Hari</button>
    <button id="nextBtn">+5 Hari ▶</button>
    <button id="resetModeBtn">🔄 Reset Mode Ini</button>
    <button id="resetPrevBtn">🔁 Reset Mode Sebelumnya</button>
    <button id="resetAllBtn">🗑️ Reset Semua</button>
</div>

<div class="info-panel">
    <div class="info-box">
        <h3>📊 Perlakuan</h3>
        <div id="treatmentInfo">Mode Normal: parameter optimal</div>
    </div>
    <div class="info-box">
        <h3>🌱 Respon Tanaman</h3>
        <div id="plantInfo">Tanaman siap tumbuh</div>
    </div>
</div>

<canvas id="growthChart" width="800" height="400"></canvas>

</div>
<script src="script.js"></script>
</body>
</html>
