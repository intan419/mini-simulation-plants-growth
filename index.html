<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌻 Simulator Pertumbuhan Bunga Matahari</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <h1>🌻 SIMULATOR PERTUMBUHAN BUNGA MATAHARI</h1>

        <!-- Mode Selector -->
        <div class="mode-card">
            <span class="mode-label">🎮 MODE:</span>
            <select id="modeSelect">
                <option value="normal">🌿 NORMAL (Optimal)</option>
                <option value="experiment">🧪 EKSPERIMEN</option>
            </select>
        </div>

        <!-- Info & Animasi -->
        <div class="info-animation">
            <div class="info-card">
                <div>📅 HARI: <strong id="dayDisplay">0</strong></div>
                <div>📏 TINGGI: <strong id="heightDisplay">0</strong> cm</div>
                <div>🌱 FASE: <strong id="phaseDisplay">🌰 Biji</strong></div>
            </div>
            <div class="animation-card" id="animationCard">
                <div class="sky"></div>
                <div class="ground"></div>
                <div class="plant-holder">
                    <div id="plantEmoji" class="plant-emoji">🌰</div>
                </div>
            </div>
        </div>

        <!-- Slider Controls -->
        <div class="sliders-grid" id="slidersGrid">
            <div class="slider-card">
                <label>💧 AIR: <span id="waterVal">100</span> mm/hari</label>
                <input type="range" id="water" min="0" max="200" value="100" step="5">
            </div>
            <div class="slider-card">
                <label>☀️ CAHAYA: <span id="lightVal">80</span> %</label>
                <input type="range" id="light" min="0" max="100" value="80">
            </div>
            <div class="slider-card">
                <label>🌡️ SUHU: <span id="tempVal">27</span> °C</label>
                <input type="range" id="temp" min="10" max="40" value="27">
            </div>
            <div class="slider-card">
                <label>🧪 pH TANAH: <span id="phVal">6.5</span></label>
                <input type="range" id="ph" min="3" max="9" step="0.1" value="6.5">
            </div>
            <div class="slider-card">
                <label>💨 KELEMBABAN: <span id="humVal">60</span> %</label>
                <input type="range" id="humidity" min="0" max="100" value="60">
            </div>
            <div class="slider-card">
                <label>🌾 PUPUK:</label>
                <select id="fertilizer">
                    <option value="none">❌ Tidak pakai</option>
                    <option value="npk" selected>✅ NPK</option>
                    <option value="organic">🌿 Organik</option>
                </select>
            </div>
            <div class="slider-card">
                <label>📊 DOSIS PUPUK: <span id="fertVal">50</span> %</label>
                <input type="range" id="fertDose" min="0" max="100" value="50">
            </div>
            <div class="slider-card">
                <label>🍂 MUSIM:</label>
                <select id="season">
                    <option value="optimal">🌸 Optimal</option>
                    <option value="kemarau">☀️ Kemarau</option>
                    <option value="hujan">🌧️ Hujan</option>
                </select>
            </div>
        </div>

        <!-- Tombol Navigasi -->
        <div class="button-group">
            <button id="prevBtn">◀ -5 HARI</button>
            <button id="nextBtn">+5 HARI ▶</button>
            <button id="resetCurrentBtn">🔄 RESET MODE INI</button>
            <button id="resetOtherBtn">🔁 RESET MODE LAIN</button>
            <button id="resetAllBtn">🗑️ RESET SEMUA</button>
        </div>

        <!-- Info Panel -->
        <div class="info-panel">
            <div class="info-box">
                <h3>📊 PERLAKUAN</h3>
                <div id="treatmentInfo">Mode Normal: Parameter optimal</div>
            </div>
            <div class="info-box">
                <h3>🌱 RESPON TANAMAN</h3>
                <div id="plantInfo">Siap tumbuh 🌱</div>
            </div>
        </div>

        <!-- Grafik -->
        <div class="chart-container">
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
