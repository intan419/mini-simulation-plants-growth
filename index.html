<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻 Simulator Pertumbuhan Bunga Matahari | Real Data + Animasi Gambar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #1a5f2a 0%, #0d3b1a 100%);
        font-family: 'Poppins', sans-serif;
        padding: 20px;
        min-height: 100vh;
    }

    .main {
        max-width: 1200px;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
        color: #ffec80;
        text-shadow: 3px 3px 0 #b45f1b;
        margin-bottom: 20px;
        font-size: 1.8rem;
    }

    .card {
        background: rgba(255, 248, 225, 0.95);
        border-radius: 20px;
        padding: 16px 20px;
        margin: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        backdrop-filter: blur(4px);
    }

    .center {
        text-align: center;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
        margin: 16px 0;
    }

    label {
        font-weight: 600;
        color: #5a3a1a;
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        border-radius: 30px;
        border: 1px solid #d4a259;
        background: #fffae9;
        font-family: inherit;
    }

    input[type="range"] {
        padding: 0;
    }

    button {
        background: #f5b642;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        border-radius: 40px;
        font-weight: bold;
        font-family: inherit;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 3px 0 #a5661a;
    }

    button:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #a5661a;
    }

    .analysis-container {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin: 20px 0;
    }

    .analysis-box {
        flex: 1;
        background: #2c2b26;
        color: #f9eec1;
        border-radius: 20px;
        padding: 16px;
        min-width: 200px;
    }

    .analysis-box h3 {
        color: #ffcd7e;
        margin-bottom: 12px;
    }

    .flower-area {
        text-align: center;
        margin: 15px 0;
        position: relative;
    }

    #plantImg {
        width: 100%;
        max-width: 320px;
        height: auto;
        margin: 0 auto;
        display: block;
        filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
        transition: all 0.3s ease;
    }

    .badge {
        background: #f5b642;
        color: #2d2b1f;
        padding: 4px 12px;
        border-radius: 40px;
        display: inline-block;
        font-weight: bold;
    }

    .status-alert {
        background: #c7254e;
        color: white;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
        animation: pulse 1s infinite;
    }

    .status-warning {
        background: #e67e22;
        color: white;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
    }

    .status-dead {
        background: #5a2a1a;
        color: #ddd;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
    }

    @media (max-width: 700px) {
        .container {
            grid-template-columns: 1fr;
        }
        h1 {
            font-size: 1.3rem;
        }
    }

    .stress-indicator {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 10px;
        flex-wrap: wrap;
    }

    .stress-tag {
        background: #c0392b;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: bold;
    }

    #growthChart {
        background: #fffef7;
        border-radius: 24px;
        padding: 12px;
        margin-top: 20px;
        max-height: 350px;
    }
</style>
</head>

<body>
<div class="main">

<h1>🌻 Simulator Pertumbuhan Bunga Matahari</h1>

<div class="card center">
    🎮 Mode: 
    <select id="mode">
        <option value="normal">🌿 Normal (Data Real)</option>
        <option value="experiment">🧪 Eksperimen</option>
    </select>
    <span style="margin-left: 15px;" class="badge" id="modeBadge">Normal</span>
</div>

<div class="card center" id="statusCard">
    📆 <strong>Hari:</strong> <span id="day">0</span> &nbsp;&nbsp;|&nbsp;&nbsp;
    📏 <strong>Tinggi:</strong> <span id="height">0.0</span> cm &nbsp;&nbsp;|&nbsp;&nbsp;
    🌱 <strong>Fase:</strong> <span id="phase">Dormancy</span>
    <br><br>
    <span id="healthStatus" class="badge">❤️ Sehat</span>
</div>

<!-- Gambar bunga sesuai fase -->
<div class="flower-area">
    <img id="plantImg" src="assets/seed.png" alt="Bunga Matahari">
</div>

<!-- Stress indicator -->
<div class="stress-indicator" id="stressList"></div>

<div class="container">
    <div class="card"><label>💧 Air: <span id="waterVal">100</span> mm/hari</label><input id="water" type="range" min="0" max="200" value="100"></div>
    <div class="card"><label>☀️ Cahaya: <span id="lightVal">80</span> %</label><input id="light" type="range" min="0" max="100" value="80"></div>
    <div class="card"><label>🌡️ Suhu: <span id="tempVal">27</span> °C</label><input id="temp" type="range" min="10" max="40" value="27"></div>
    <div class="card"><label>⚗️ pH Tanah: <span id="phVal">6.5</span></label><input id="ph" type="range" min="3" max="9" step="0.1" value="6.5"></div>
    <div class="card"><label>💨 Kelembaban: <span id="humVal">60</span> %</label><input id="humidity" type="range" min="0" max="100" value="60"></div>
    <div class="card"><label>🧪 Pupuk: </label><select id="fertilizer"><option value="none">Tidak pakai</option><option value="npk">NPK</option><option value="organic">Organik</option></select></div>
    <div class="card"><label>⚖️ Dosis Pupuk: <span id="fertVal">50</span> %</label><input id="fertDose" type="range" min="0" max="100" value="50"></div>
    <div class="card"><label>🍂 Musim: </label><select id="season"><option value="optimal">Optimal</option><option value="kemarau">Kemarau</option><option value="hujan">Hujan</option></select></div>
</div>

<div class="card center">
    <button onclick="changeDay(-5)">⬅️ -5 Hari</button>
    <button onclick="changeDay(1)">🌱 +1 Hari</button>
    <button onclick="changeDay(5)">+5 Hari ➡️</button>
    <button onclick="changeDay(15)">🌻 +15 Hari</button>
</div>

<div class="card center">
    <button onclick="resetCurrentMode()">🔄 Reset Mode Ini</button>
    <button onclick="resetPreviousMode()">📁 Reset Mode Sebelumnya</button>
    <button onclick="resetAllModes()">⚠️ Reset Semua</button>
</div>

<div class="analysis-container">
    <div class="analysis-box"><h3>📊 Perlakuan</h3><div id="treatmentInfo">-</div></div>
    <div class="analysis-box"><h3>🌱 Respon Tanaman</h3><div id="plantInfo">-</div></div>
</div>

<canvas id="growthChart" width="800" height="300"></canvas>

</div>

<script>
    // ========== STATE UNTUK 2 MODE ==========
    let modes = {
        normal: { day: 0, height: 0, history: [0], isDead: false, wiltLevel: 0, stressCauses: [], deadCause: null },
        experiment: { day: 0, height: 0, history: [0], isDead: false, wiltLevel: 0, stressCauses: [], deadCause: null }
    };
    let currentMode = "normal";
    let growthChart = null;

    // Parameter environment
    let env = {
        water: 100, light: 80, temp: 27, ph: 6.5, humidity: 60,
        fertilizer: "npk", fertDose: 50, season: "optimal"
    };

    const MAX_HEIGHT = 250;

    // ========== REAL DATA TARGET TINGGI (sesuai data kamu) ==========
    function getTargetHeight(day) {
        if (day <= 10) return 2 + (day / 10) * 3;
        if (day <= 20) return 5 + ((day - 10) / 10) * 15;
        if (day <= 40) return 20 + ((day - 20) / 20) * 80;
        if (day <= 60) return 100 + ((day - 40) / 20) * 80;
        if (day <= 75) return 180 + ((day - 60) / 15) * 40;
        if (day <= 90) return 220 + ((day - 75) / 15) * 30;
        return Math.max(0, 250 - (day - 90) * 3.5);
    }

    // ========== FASE BERDASARKAN TINGGI (sesuai gambar PNG) ==========
    // Urutan fase: seed (0-2cm), sprout (2-5cm), small (5-20cm), medium (20-80cm), flower (80-150cm), bloom (150-210cm), wilt (>210cm atau mati)
    function getPhaseByHeight(height, isDead) {
        if (isDead) return { name: "Mati", img: "assets/wilt.png" };
        if (height < 2) return { name: "Dormancy", img: "assets/seed.png" };
        if (height < 5) return { name: "Germination", img: "assets/sprout.png" };
        if (height < 20) return { name: "Seedling", img: "assets/small.png" };
        if (height < 80) return { name: "Vegetative", img: "assets/medium.png" };
        if (height < 150) return { name: "Reproductive", img: "assets/flower.png" };
        if (height < 210) return { name: "Anthesis", img: "assets/bloom.png" };
        return { name: "Senescence", img: "assets/wilt.png" };
    }

    // ========== FUNGSI STRES LINGKUNGAN ==========
    function calculateStressLevel() {
        let stress = 0;
        let causes = [];
        
        // Air (ideal 80-120)
        if (env.water < 30) { stress += 40; causes.push("💧 Kekeringan ekstrim"); }
        else if (env.water < 50) { stress += 25; causes.push("💧 Kekurangan air"); }
        else if (env.water > 170) { stress += 30; causes.push("💧 Kelebihan air"); }
        else if (env.water > 140) { stress += 15; causes.push("💧 Air berlebih"); }
        
        // Cahaya (ideal 70-90)
        if (env.light < 20) { stress += 35; causes.push("☀️ Kegelapan ekstrim"); }
        else if (env.light < 40) { stress += 20; causes.push("☀️ Cahaya terlalu rendah"); }
        else if (env.light > 95) { stress += 15; causes.push("☀️ Terik berlebih"); }
        
        // Suhu (ideal 22-30)
        if (env.temp > 38) { stress += 45; causes.push("🌡️ Panas ekstrim"); }
        else if (env.temp > 34) { stress += 25; causes.push("🌡️ Terlalu panas"); }
        else if (env.temp < 10) { stress += 40; causes.push("🌡️ Beku"); }
        else if (env.temp < 16) { stress += 20; causes.push("🌡️ Terlalu dingin"); }
        
        // pH (ideal 6-7.5)
        if (env.ph < 4.5 || env.ph > 8.5) { stress += 35; causes.push("⚗️ pH sangat ekstrim"); }
        else if (env.ph < 5.5 || env.ph > 7.8) { stress += 15; causes.push("⚗️ pH tidak ideal"); }
        
        // Kelembaban (ideal 40-70)
        if (env.humidity < 25) { stress += 25; causes.push("💨 Udara terlalu kering"); }
        else if (env.humidity > 85) { stress += 15; causes.push("💨 Kelembaban terlalu tinggi"); }
        
        // Pupuk
        let dosePercent = env.fertDose;
        if (env.fertilizer !== "none" && dosePercent > 80) { stress += 25; causes.push("🧪 Overdosis pupuk"); }
        else if (env.fertilizer !== "none" && dosePercent > 65) { stress += 10; causes.push("🧪 Pupuk berlebih"); }
        else if (env.fertilizer === "none") { stress += 10; causes.push("🧪 Tidak pakai pupuk"); }
        
        // Musim
        if (env.season === "kemarau" && env.water < 60) { stress += 15; causes.push("🍂 Kemarau + kekeringan"); }
        if (env.season === "hujan" && env.water > 150) { stress += 15; causes.push("🍂 Hujan + kelebihan air"); }
        
        return { level: Math.min(100, stress), causes: causes.slice(0, 4) };
    }

    // ========== UPDATE LAYU & KEMATIAN ==========
    function updateWiltAndDeath(state) {
        if (state.isDead) return "dead";
        
        let stress = calculateStressLevel();
        let stressLevel = stress.level;
        let currentWilt = state.wiltLevel || 0;
        
        // Kematian karena usia tua (di atas 120 hari)
        if (state.day > 120 && state.height < 10) {
            state.isDead = true;
            state.wiltLevel = 100;
            state.deadCause = "usia tua (siklus hidup selesai)";
            return "dead";
        }
        
        // Kematian karena stres berat
        if (stressLevel >= 75) {
            state.isDead = true;
            state.wiltLevel = 100;
            state.deadCause = stress.causes.join(", ");
            return "dead";
        }
        else if (stressLevel >= 55) {
            state.wiltLevel = Math.min(100, currentWilt + 6);
            if (state.wiltLevel >= 90) {
                state.isDead = true;
                state.deadCause = "stres lingkungan berkepanjangan";
                return "dead";
            }
            return "heavy_wilt";
        }
        else if (stressLevel >= 35) {
            state.wiltLevel = Math.min(85, currentWilt + 3);
            return "light_wilt";
        }
        else {
            state.wiltLevel = Math.max(0, currentWilt - 2);
            return "healthy";
        }
    }

    // ========== FAKTOR PERTUMBUHAN (dengan Hukum Minimum Liebig) ==========
    function getGrowthFactor() {
        // Faktor optimal masing-masing parameter (0-1)
        let waterFactor = (env.water >= 70 && env.water <= 130) ? 1 : 
                          (env.water < 40 ? 0.3 : (env.water > 160 ? 0.5 : 0.7));
        let lightFactor = (env.light >= 65 && env.light <= 90) ? 1 : 
                          (env.light < 35 ? 0.3 : 0.7);
        let tempFactor = (env.temp >= 20 && env.temp <= 30) ? 1 : 
                         (env.temp < 15 ? 0.3 : (env.temp > 35 ? 0.4 : 0.6));
        let phFactor = (env.ph >= 6 && env.ph <= 7.5) ? 1 : 
                       (env.ph < 5 ? 0.3 : (env.ph > 8 ? 0.4 : 0.7));
        let humFactor = (env.humidity >= 45 && env.humidity <= 75) ? 1 : 
                        (env.humidity < 30 ? 0.4 : 0.7);
        
        let fertFactor = 1;
        if (env.fertilizer === "npk") fertFactor = 1 + (env.fertDose / 100) * 0.4;
        else if (env.fertilizer === "organic") fertFactor = 1 + (env.fertDose / 100) * 0.25;
        else fertFactor = 0.75;
        fertFactor = Math.min(1.2, fertFactor);
        
        let seasonFactor = (env.season === "optimal") ? 1 : (env.season === "kemarau" ? 0.7 : 0.85);
        
        // HUKUM MINIMUM LIEBIG (faktor pembatas)
        let factors = [waterFactor, lightFactor, tempFactor, phFactor, humFactor];
        let limitingFactor = Math.min(...factors);
        
        let totalFactor = limitingFactor * fertFactor * seasonFactor;
        
        // Faktor layu
        let wiltPenalty = 1 - (state?.wiltLevel || 0) / 100;
        
        return Math.min(1.2, Math.max(0.1, totalFactor * wiltPenalty));
    }

    // ========== PERTUMBUHAN LOGISTIK (mengejar target) ==========
    function dailyGrowth(state) {
        if (state.isDead) return 0;
        if (state.height >= MAX_HEIGHT) return 0;
        
        let target = getTargetHeight(state.day + 1);
        let current = state.height;
        let factor = getGrowthFactor();
        
        // Logistic growth toward target
        let diff = Math.max(0, target - current);
        let growth = diff * 0.32 * factor;
        
        // Batas maksimum pertumbuhan per hari
        growth = Math.min(5.5, Math.max(0, growth));
        
        return parseFloat(growth.toFixed(2));
    }

    // ========== SENESCENCE (penuaan setelah 90 hari) ==========
    function applySenescence(state) {
        if (state.isDead) return;
        if (state.day > 90) {
            let reduction = (state.day - 90) * 1.2;
            state.height = Math.max(0, state.height - reduction);
        }
        if (state.height <= 1 && state.day > 100) {
            state.isDead = true;
            state.deadCause = "usia tua (siklus hidup selesai)";
        }
    }

    // ========== MAJUKAN HARI ==========
    function advanceDays(delta) {
        if (delta < 0) {
            alert("⚠️ Tidak bisa mundur ke masa lalu! Gunakan tombol Reset.");
            return;
        }
        
        let state = modes[currentMode];
        
        for (let i = 0; i < delta; i++) {
            if (state.isDead) {
                state.day++;
                state.history.push(state.height);
                continue;
            }
            
            let growth = dailyGrowth(state);
            state.height = parseFloat((state.height + growth).toFixed(2));
            if (state.height > MAX_HEIGHT) state.height = MAX_HEIGHT;
            
            state.day++;
            
            // Update layu/mati
            updateWiltAndDeath(state);
            
            // Senescence (penuaan)
            applySenescence(state);
            
            state.history.push(state.height);
            if (state.history.length > 200) state.history.shift();
        }
        
        updateUI();
        updateChart();
    }

    // ========== RESET FUNCTION ==========
    function resetCurrentMode() {
        modes[currentMode] = { 
            day: 0, height: 0, history: [0], isDead: false, 
            wiltLevel: 0, stressCauses: [], deadCause: null 
        };
        updateUI();
        updateChart();
    }
    
    function resetPreviousMode() {
        let prev = currentMode === "normal" ? "experiment" : "normal";
        modes[prev] = { 
            day: 0, height: 0, history: [0], isDead: false, 
            wiltLevel: 0, stressCauses: [], deadCause: null 
        };
        updateChart();
        if (currentMode === prev) updateUI();
    }
    
    function resetAllModes() {
        modes.normal = { day: 0, height: 0, history: [0], isDead: false, wiltLevel: 0, stressCauses: [], deadCause: null };
        modes.experiment = { day: 0, height: 0, history: [0], isDead: false, wiltLevel: 0, stressCauses: [], deadCause: null };
        updateUI();
        updateChart();
    }

    function changeDay(delta) {
        if (delta > 0) advanceDays(delta);
        else if (delta < 0) {
            if (confirm("⚠️ Mundur hari akan mengganggu data pertumbuhan? Gunakan Reset jika ingin memulai ulang.")) {
                // Tidak implementasi mundur untuk menjaga akurasi
                alert("Gunakan tombol Reset Mode untuk memulai ulang.");
            }
        }
    }

    // ========== UPDATE UI ==========
    function updateUI() {
        let state = modes[currentMode];
        let phaseData = getPhaseByHeight(state.height, state.isDead);
        
        document.getElementById("day").innerText = state.day;
        document.getElementById("height").innerText = state.height.toFixed(1);
        document.getElementById("phase").innerHTML = phaseData.name;
        document.getElementById("modeBadge").innerHTML = currentMode === "normal" ? "🌿 Normal" : "🧪 Eksperimen";
        
        // Update gambar
        let imgEl = document.getElementById("plantImg");
        imgEl.src = phaseData.img;
        
        // Handle error gambar tidak ditemukan
        imgEl.onerror = function() {
            this.src = "https://cdn-icons-png.flaticon.com/512/1048/1048936.png";
        };
        
        // Update status kesehatan
        let statusSpan = document.getElementById("healthStatus");
        let stress = calculateStressLevel();
        let wilt = state.wiltLevel || 0;
        
        if (state.isDead) {
            statusSpan.className = "status-dead";
            statusSpan.innerHTML = `💀 MATI (${state.deadCause || "stres fatal"}) 💀`;
        } else if (wilt > 65) {
            statusSpan.className = "status-alert";
            statusSpan.innerHTML = `🥀 LAYU PARAH (${Math.floor(wilt)}%) - Segera perbaiki!`;
        } else if (wilt > 35) {
            statusSpan.className = "status-warning";
            statusSpan.innerHTML = `🌿 LAYU RINGAN (${Math.floor(wilt)}%)`;
        } else if (stress.level > 45) {
            statusSpan.className = "status-warning";
            statusSpan.innerHTML = `⚠️ TERSTRES (${stress.level}%)`;
        } else {
            statusSpan.className = "badge";
            statusSpan.innerHTML = "❤️ SEHAT & SUBUR";
        }
        
        // Stress list
        let stressDiv = document.getElementById("stressList");
        if (stress.causes.length > 0 && !state.isDead) {
            stressDiv.innerHTML = stress.causes.map(c => `<span class="stress-tag">${c}</span>`).join('');
        } else if (state.isDead) {
            stressDiv.innerHTML = '<span class="stress-tag">💀 Tanaman mati, silakan reset</span>';
        } else {
            stressDiv.innerHTML = '<span style="color:#82b74e;">✅ Kondisi optimal</span>';
        }
        
        // Treatment info
        let fertName = env.fertilizer === "npk" ? "NPK" : (env.fertilizer === "organic" ? "Organik" : "Tidak pakai");
        document.getElementById("treatmentInfo").innerHTML = `
            💧 Air: ${env.water} mm (80-120) | ☀️ Cahaya: ${env.light}% (70-90)<br>
            🌡️ Suhu: ${env.temp}°C (22-30) | ⚗️ pH: ${env.ph} (6-7.5)<br>
            💨 Kelembaban: ${env.humidity}% (40-70)<br>
            🧪 Pupuk: ${fertName} (${env.fertDose}%) | 🍂 Musim: ${env.season === "optimal" ? "Optimal" : (env.season === "kemarau" ? "Kemarau" : "Hujan")}
        `;
        
        // Plant response
        let target = getTargetHeight(state.day);
        let persenTarget = target > 0 ? ((state.height / target) * 100).toFixed(0) : 0;
        let growthRate = dailyGrowth(state);
        
        let responseText = `
            📈 Laju tumbuh: ${growthRate.toFixed(2)} cm/hari<br>
            📊 Target hari ke-${state.day}: ${target.toFixed(1)} cm<br>
            📏 Capaian: ${persenTarget}% dari target<br>
            🥀 Tingkat layu: ${Math.floor(wilt)}%
        `;
        
        if (state.isDead) {
            responseText = `💀 TANAMAN MATI<br>📏 Tinggi akhir: ${state.height.toFixed(1)} cm<br>⚠️ Penyebab: ${state.deadCause || "stres lingkungan"}`;
        } else if (wilt > 50) {
            responseText += `<br><span style="color:#ff8888;">⚠️ PERINGATAN! Segera perbaiki lingkungan!</span>`;
        }
        
        document.getElementById("plantInfo").innerHTML = responseText;
    }

    // ========== GRAFIK ==========
    function updateChart() {
        let normalHist = modes.normal.history.slice(-80);
        let expHist = modes.experiment.history.slice(-80);
        let labels = normalHist.map((_, idx) => idx);
        
        if (growthChart) growthChart.destroy();
        let ctx = document.getElementById("growthChart").getContext("2d");
        growthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '🌿 Mode Normal', data: normalHist, borderColor: '#4caf50', backgroundColor: 'rgba(76,175,80,0.1)', tension: 0.3, fill: true },
                    { label: '🧪 Mode Eksperimen', data: expHist, borderColor: '#ff9800', backgroundColor: 'rgba(255,152,0,0.05)', tension: 0.3, fill: true }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { 
                    legend: { position: 'top' }, 
                    tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw} cm` } } 
                },
                scales: { y: { title: { display: true, text: 'Tinggi (cm)' }, beginAtZero: true, max: MAX_HEIGHT } }
            }
        });
    }

    // ========== BIND INPUT SLIDER ==========
    function bindInputs() {
        const sliders = [
            { id: "water", prop: "water", max: 200, isInt: true },
            { id: "light", prop: "light", max: 100, isInt: true },
            { id: "temp", prop: "temp", max: 40, isInt: true },
            { id: "ph", prop: "ph", max: 9, step: 0.1, isInt: false },
            { id: "humidity", prop: "humidity", max: 100, isInt: true },
            { id: "fertDose", prop: "fertDose", max: 100, isInt: true }
        ];
        
        sliders.forEach(s => {
            let el = document.getElementById(s.id);
            let span = document.getElementById(s.id + "Val");
            el.addEventListener("input", (e) => {
                let val = s.isInt ? parseInt(e.target.value) : parseFloat(e.target.value);
                env[s.prop] = val;
                if (span) span.innerText = val;
                if (currentMode === "experiment") updateUI();
            });
        });
        
        document.getElementById("fertilizer").addEventListener("change", (e) => {
            env.fertilizer = e.target.value;
            if (currentMode === "experiment") updateUI();
        });
        
        document.getElementById("season").addEventListener("change", (e) => {
            env.season = e.target.value;
            if (currentMode === "experiment") updateUI();
        });
        
        document.getElementById("mode").addEventListener("change", (e) => {
            currentMode = e.target.value;
            // Mode normal: reset ke parameter optimal
            if (currentMode === "normal") {
                env.water = 100; env.light = 80; env.temp = 27; env.ph = 6.5;
                env.humidity = 60; env.fertilizer = "npk"; env.fertDose = 50; env.season = "optimal";
                // Update tampilan slider
                document.getElementById("water").value = 100; document.getElementById("waterVal").innerText = 100;
                document.getElementById("light").value = 80; document.getElementById("lightVal").innerText = 80;
                document.getElementById("temp").value = 27; document.getElementById("tempVal").innerText = 27;
                document.getElementById("ph").value = 6.5; document.getElementById("phVal").innerText = 6.5;
                document.getElementById("humidity").value = 60; document.getElementById("humVal").innerText = 60;
                document.getElementById("fertilizer").value = "npk";
                document.getElementById("fertDose").value = 50; document.getElementById("fertVal").innerText = 50;
                document.getElementById("season").value = "optimal";
            }
            updateUI();
            updateChart();
        });
    }

    // ========== INIT ==========
    window.onload = () => {
        bindInputs();
        updateUI();
        updateChart();
    };
    
    window.changeDay = changeDay;
    window.resetCurrentMode = resetCurrentMode;
    window.resetPreviousMode = resetPreviousMode;
    window.resetAllModes = resetAllModes;
</script>
</body>
</html>
