<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻 Simulator Pertumbuhan Bunga Matahari</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="main">

<h1>🌻 Simulator Pertumbuhan Bunga Matahari</h1>

<div class="card center">
Mode:
<select id="mode">
<option value="normal">Normal</option>
<option value="experiment">Eksperimen</option>
</select>
</div>

<div class="card center">
Hari: <span id="day">0</span><br>
Tinggi: <span id="height">0</span> cm<br>
Fase: <span id="phase">🌰 Dormancy</span>
</div>

<img id="plantImg" src="assets/seed.png" alt="Tanaman">

<div class="container">

<div class="card">
<label>💧 Air: <span id="waterVal">100</span> mm/hari</label>
<input id="water" type="range" min="0" max="200" value="100">
</div>

<div class="card">
<label>☀️ Cahaya: <span id="lightVal">80</span> %</label>
<input id="light" type="range" min="0" max="100" value="80">
</div>

<div class="card">
<label>🌡️ Suhu: <span id="tempVal">27</span> °C</label>
<input id="temp" type="range" min="10" max="40" value="27">
</div>

<div class="card">
<label>🧪 pH: <span id="phVal">6.5</span></label>
<input id="ph" type="range" min="3" max="9" step="0.1" value="6.5">
</div>

<div class="card">
<label>💨 Kelembaban: <span id="humVal">60</span> %</label>
<input id="humidity" type="range" min="0" max="100" value="60">
</div>

<div class="card">
<label>🌾 Pupuk</label>
<select id="fertilizer">
<option value="none">Tidak pakai</option>
<option value="npk">NPK</option>
<option value="organic">Organik</option>
</select>
</div>

<div class="card">
<label>📊 Dosis Pupuk: <span id="fertVal">50</span> %</label>
<input id="fertDose" type="range" min="0" max="100" value="50">
</div>

<div class="card">
<label>🍂 Musim</label>
<select id="season">
<option value="optimal">Optimal</option>
<option value="kemarau">Kemarau</option>
<option value="hujan">Hujan</option>
</select>
</div>

</div>

<div class="card center">
<button onclick="prevDay()">⬅️ -5 Hari</button>
<button onclick="nextDay()">+5 Hari ➡️</button>
<button onclick="resetAll()">🔄 Reset Semua</button>
</div>

<div class="analysis-container">
<div class="analysis-box">
<h3>📊 Perlakuan</h3>
<div id="treatmentInfo"></div>
</div>

<div class="analysis-box">
<h3>🌱 Respon Tanaman</h3>
<div id="plantInfo"></div>
</div>
</div>

<canvas id="chart" width="800" height="400"></canvas>

</div>

<script src="script.js"></script>
</body>
</html>
