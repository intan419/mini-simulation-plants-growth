<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻 Simulator Pertumbuhan Bunga Matahari | Layu & Mati</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #1a5f2a 0%, #0d3b1a 100%);
        font-family: 'Poppins', sans-serif;
        padding: 20px;
        min-height: 100vh;
    }

    .main {
        max-width: 1200px;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
        color: #ffec80;
        text-shadow: 3px 3px 0 #b45f1b;
        margin-bottom: 20px;
        font-size: 1.8rem;
    }

    .card {
        background: rgba(255, 248, 225, 0.95);
        border-radius: 20px;
        padding: 16px 20px;
        margin: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        backdrop-filter: blur(4px);
    }

    .center {
        text-align: center;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 12px;
        margin: 16px 0;
    }

    label {
        font-weight: 600;
        color: #5a3a1a;
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        border-radius: 30px;
        border: 1px solid #d4a259;
        background: #fffae9;
        font-family: inherit;
    }

    input[type="range"] {
        padding: 0;
    }

    button {
        background: #f5b642;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        border-radius: 40px;
        font-weight: bold;
        font-family: inherit;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 3px 0 #a5661a;
    }

    button:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #a5661a;
    }

    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    .analysis-container {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin: 20px 0;
    }

    .analysis-box {
        flex: 1;
        background: #2c2b26;
        color: #f9eec1;
        border-radius: 20px;
        padding: 16px;
        min-width: 200px;
    }

    .analysis-box h3 {
        color: #ffcd7e;
        margin-bottom: 12px;
    }

    #growthChart {
        background: #fffef7;
        border-radius: 24px;
        padding: 12px;
        margin-top: 20px;
        max-height: 350px;
    }

    .stat-highlight {
        font-size: 1.5rem;
        font-weight: bold;
        color: #f5b642;
    }

    canvas#flowerCanvas {
        display: block;
        margin: 0 auto;
        background: #e9c891;
        border-radius: 60px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 380px;
        height: auto;
        cursor: pointer;
    }

    .flower-area {
        text-align: center;
        margin: 15px 0;
        position: relative;
    }

    .badge {
        background: #f5b642;
        color: #2d2b1f;
        padding: 4px 12px;
        border-radius: 40px;
        display: inline-block;
        font-weight: bold;
    }

    .status-alert {
        background: #c7254e;
        color: white;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
        animation: pulse 1s infinite;
    }

    .status-warning {
        background: #e67e22;
        color: white;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
    }

    .status-dead {
        background: #5a2a1a;
        color: #ddd;
        padding: 8px 16px;
        border-radius: 40px;
        font-weight: bold;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
    }

    @media (max-width: 700px) {
        .container {
            grid-template-columns: 1fr;
        }
        h1 {
            font-size: 1.3rem;
        }
    }

    .stress-indicator {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 10px;
        flex-wrap: wrap;
    }

    .stress-tag {
        background: #c0392b;
        color: white;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: bold;
    }
</style>
</head>

<body>
<div class="main">

<h1>🌻 Simulator Pertumbuhan Bunga Matahari</h1>

<div class="card center">
    🎮 Mode: 
    <select id="mode">
        <option value="normal">🌿 Normal</option>
        <option value="experiment">🧪 Eksperimen</option>
    </select>
    <span style="margin-left: 15px;" class="badge" id="modeBadge">Normal</span>
</div>

<div class="card center" id="statusCard">
    📆 <strong>Hari:</strong> <span id="day">0</span> &nbsp;&nbsp;|&nbsp;&nbsp;
    📏 <strong>Tinggi:</strong> <span id="height">0.0</span> cm &nbsp;&nbsp;|&nbsp;&nbsp;
    🌱 <strong>Fase:</strong> <span id="phase">Dormancy</span>
    <br><br>
    <span id="healthStatus" class="badge">❤️ Sehat</span>
</div>

<!-- Canvas untuk gambar bunga dinamis -->
<div class="flower-area">
    <canvas id="flowerCanvas" width="380" height="280" style="width:100%; max-width:380px; aspect-ratio:380/280"></canvas>
</div>

<!-- Stress indicator -->
<div class="stress-indicator" id="stressList"></div>

<div class="container">
    <div class="card"><label>💧 Air: <span id="waterVal">100</span> mm/hari</label><input id="water" type="range" min="0" max="200" value="100"></div>
    <div class="card"><label>☀️ Cahaya: <span id="lightVal">80</span> %</label><input id="light" type="range" min="0" max="100" value="80"></div>
    <div class="card"><label>🌡️ Suhu: <span id="tempVal">27</span> °C</label><input id="temp" type="range" min="10" max="40" value="27"></div>
    <div class="card"><label>⚗️ pH Tanah: <span id="phVal">6.5</span></label><input id="ph" type="range" min="3" max="9" step="0.1" value="6.5"></div>
    <div class="card"><label>💨 Kelembaban: <span id="humVal">60</span> %</label><input id="humidity" type="range" min="0" max="100" value="60"></div>
    <div class="card"><label>🧪 Pupuk: </label><select id="fertilizer"><option value="none">Tidak pakai</option><option value="npk">NPK</option><option value="organic">Organik</option></select></div>
    <div class="card"><label>⚖️ Dosis Pupuk: <span id="fertVal">50</span> %</label><input id="fertDose" type="range" min="0" max="100" value="50"></div>
    <div class="card"><label>🍂 Musim: </label><select id="season"><option value="optimal">Optimal</option><option value="kemarau">Kemarau</option><option value="hujan">Hujan</option></select></div>
</div>

<div class="card center">
    <button onclick="changeDay(-5)">⬅️ -5 Hari</button>
    <button onclick="changeDay(1)" id="grow1Btn">🌱 +1 Hari</button>
    <button onclick="changeDay(5)">+5 Hari ➡️</button>
    <button onclick="changeDay(15)">🌻 +15 Hari</button>
</div>

<div class="card center">
    <button onclick="resetCurrentMode()">🔄 Reset Mode Ini</button>
    <button onclick="resetPreviousMode()">📁 Reset Mode Sebelumnya</button>
    <button onclick="resetAllModes()">⚠️ Reset Semua</button>
</div>

<div class="analysis-container">
    <div class="analysis-box"><h3>📊 Perlakuan</h3><div id="treatmentInfo">-</div></div>
    <div class="analysis-box"><h3>🌱 Respon Tanaman</h3><div id="plantInfo">-</div></div>
</div>

<canvas id="growthChart" width="800" height="300"></canvas>

</div>

<script>
    // ---------- STATE untuk 2 mode (Normal & Eksperimen) ----------
    let modes = {
        normal: { day: 0, height: 0.0, phase: "Dormancy", history: [0], isDead: false, wiltLevel: 0, stressCauses: [] },
        experiment: { day: 0, height: 0.0, phase: "Dormancy", history: [0], isDead: false, wiltLevel: 0, stressCauses: [] }
    };
    let currentMode = "normal";
    let growthChart = null;

    // Parameter environment (akan diupdate dari slider)
    let env = {
        water: 100,
        light: 80,
        temp: 27,
        ph: 6.5,
        humidity: 60,
        fertilizer: "none",
        fertDose: 50,
        season: "optimal"
    };

    const MAX_HEIGHT = 210;

    // Hitung tingkat stres berdasarkan environment
    function calculateStressLevel(stateHeight) {
        let stress = 0;
        let causes = [];
        
        // Cek stres air (kekeringan atau kebanjiran)
        if (env.water < 30) { stress += 40; causes.push("💧 Kekeringan ekstrim"); }
        else if (env.water < 50) { stress += 20; causes.push("💧 Kekeringan ringan"); }
        else if (env.water > 180) { stress += 25; causes.push("💧 Kelebihan air"); }
        else if (env.water > 150) { stress += 10; causes.push("💧 Air berlebih"); }
        
        // Cek stres cahaya
        if (env.light < 20) { stress += 35; causes.push("☀️ Kegelapan ekstrim"); }
        else if (env.light < 35) { stress += 20; causes.push("☀️ Cahaya terlalu rendah"); }
        else if (env.light > 95) { stress += 15; causes.push("☀️ Terik berlebih"); }
        
        // Cek stres suhu
        if (env.temp > 38) { stress += 45; causes.push("🌡️ Panas ekstrim"); }
        else if (env.temp > 34) { stress += 25; causes.push("🌡️ Terlalu panas"); }
        else if (env.temp < 10) { stress += 40; causes.push("🌡️ Beku"); }
        else if (env.temp < 15) { stress += 20; causes.push("🌡️ Terlalu dingin"); }
        
        // Cek stres pH
        if (env.ph < 4.5 || env.ph > 8) { stress += 35; causes.push("⚗️ pH sangat ekstrim"); }
        else if (env.ph < 5.5 || env.ph > 7.5) { stress += 15; causes.push("⚗️ pH tidak ideal"); }
        
        // Cek stres kelembaban
        if (env.humidity < 30) { stress += 20; causes.push("💨 Udara terlalu kering"); }
        else if (env.humidity > 90) { stress += 15; causes.push("💨 Kelembaban terlalu tinggi"); }
        
        // Overdosis pupuk
        if (env.fertilizer !== "none" && env.fertDose > 80) { stress += 25; causes.push("🧪 Overdosis pupuk"); }
        else if (env.fertilizer !== "none" && env.fertDose > 60) { stress += 10; causes.push("🧪 Pupuk berlebih"); }
        
        // Musim buruk
        if (env.season === "kemarau" && env.water < 60) { stress += 15; causes.push("🍂 Musim kemarau + kurang air"); }
        if (env.season === "hujan" && env.water > 160) { stress += 15; causes.push("🍂 Musim hujan + kelebihan air"); }
        
        return { level: Math.min(100, stress), causes: causes.slice(0, 4) };
    }
    
    // Update kondisi layu/mati berdasarkan stres
    function updateWiltAndDeath(state) {
        if (state.isDead) return "dead";
        
        let stress = calculateStressLevel(state.height);
        let stressLevel = stress.level;
        
        // Stres kumulatif: semakin lama stres, semakin parah
        let currentWilt = state.wiltLevel || 0;
        
        if (stressLevel >= 70) {
            // Stres berat -> langsung mati
            state.isDead = true;
            state.wiltLevel = 100;
            state.phase = "Mati";
            return "dead";
        } 
        else if (stressLevel >= 50) {
            // Stres sedang -> layu parah
            state.wiltLevel = Math.min(100, currentWilt + 8);
            if (state.wiltLevel >= 90) {
                state.isDead = true;
                state.phase = "Mati";
                return "dead";
            }
            return "heavy_wilt";
        }
        else if (stressLevel >= 30) {
            // Stres ringan -> layu ringan
            state.wiltLevel = Math.min(80, currentWilt + 4);
            return "light_wilt";
        }
        else {
            // Pulih dari layu jika lingkungan membaik
            state.wiltLevel = Math.max(0, currentWilt - 3);
            return "healthy";
        }
    }
    
    // Faktor pertumbuhan dipengaruhi oleh tingkat layu
    function getGrowthPenalty(state) {
        if (state.isDead) return 0;
        let wilt = state.wiltLevel || 0;
        if (wilt > 80) return 0.1;
        if (wilt > 60) return 0.3;
        if (wilt > 40) return 0.6;
        if (wilt > 20) return 0.8;
        return 1.0;
    }

    // Update fase berdasarkan tinggi (tapi jika mati override)
    function getPhaseFromHeight(h, isDead) {
        if (isDead) return "Mati";
        if (h < 0.5) return "Dormancy";
        if (h < 6) return "Germination";
        if (h < 25) return "Vegetative";
        if (h < 65) return "Budding";
        if (h < 130) return "Flowering";
        return "Reproductive";
    }

    // Hitung pertumbuhan harian (dengan faktor layu)
    function dailyGrowth(state) {
        if (state.isDead) return 0;
        if (state.height >= MAX_HEIGHT) return 0;
        
        let phaseNow = getPhaseFromHeight(state.height, false);
        let base = 0;
        switch(phaseNow) {
            case "Dormancy": base = 0.25; break;
            case "Germination": base = 1.0; break;
            case "Vegetative": base = 2.6; break;
            case "Budding": base = 3.2; break;
            case "Flowering": base = 2.2; break;
            case "Reproductive": base = 0.9; break;
            default: base = 1.2;
        }
        
        let waterFactor = (env.water >= 60 && env.water <= 170) ? 1.0 : (env.water < 40 ? 0.4 : (env.water > 220 ? 0.55 : 0.85));
        let lightFactor = (env.light >= 55 && env.light <= 90) ? 1.1 : (env.light < 25 ? 0.3 : 0.8);
        let tempFactor = (env.temp >= 18 && env.temp <= 30) ? 1.0 : (env.temp < 12 ? 0.35 : 0.7);
        let phFactor = (env.ph >= 6.0 && env.ph <= 7.5) ? 1.05 : (env.ph < 5 ? 0.5 : 0.85);
        let humFactor = (env.humidity >= 50 && env.humidity <= 80) ? 1.0 : 0.75;
        
        let fertBonus = 1.0;
        if (env.fertilizer === "npk") fertBonus = 1 + (env.fertDose / 100) * 0.35;
        else if (env.fertilizer === "organic") fertBonus = 1 + (env.fertDose / 100) * 0.25;
        
        let seasonFactor = 1.0;
        if (env.season === "kemarau") seasonFactor = 0.7;
        else if (env.season === "hujan") seasonFactor = 0.85;
        
        let wiltPenalty = getGrowthPenalty(state);
        
        let growth = base * waterFactor * lightFactor * tempFactor * phFactor * humFactor * fertBonus * seasonFactor * wiltPenalty;
        growth = Math.min(6.0, Math.max(0, growth));
        if (state.height + growth > MAX_HEIGHT) growth = MAX_HEIGHT - state.height;
        return parseFloat(growth.toFixed(2));
    }

    // Majukan hari
    function advanceDays(delta) {
        let state = modes[currentMode];
        if (delta < 0) {
            alert("Tidak bisa mundur ke masa lalu! Silakan reset jika ingin mengulang.");
            return;
        }
        
        for(let i=0; i<delta; i++) {
            if (state.isDead) {
                state.day++;
                state.history.push(state.height);
                continue;
            }
            if (state.height >= MAX_HEIGHT) {
                state.day++;
                state.history.push(state.height);
                // tetap update stres (bisa layu/mati meski sudah max)
                updateWiltAndDeath(state);
                state.phase = getPhaseFromHeight(state.height, state.isDead);
                continue;
            }
            
            let inc = dailyGrowth(state);
            state.height = parseFloat((state.height + inc).toFixed(2));
            if(state.height > MAX_HEIGHT) state.height = MAX_HEIGHT;
            
            // Update layu/mati berdasarkan stres lingkungan
            updateWiltAndDeath(state);
            state.phase = getPhaseFromHeight(state.height, state.isDead);
            state.day++;
            state.history.push(state.height);
            if(state.history.length > 400) state.history.shift();
        }
        updateUI();
        drawSunflower();
        updateChart();
    }

    // Reset mode saat ini
    function resetCurrentMode() {
        modes[currentMode] = { day: 0, height: 0.0, phase: "Dormancy", history: [0], isDead: false, wiltLevel: 0, stressCauses: [] };
        updateUI();
        drawSunflower();
        updateChart();
    }
    
    function resetPreviousMode() {
        let prev = currentMode === "normal" ? "experiment" : "normal";
        modes[prev] = { day: 0, height: 0.0, phase: "Dormancy", history: [0], isDead: false, wiltLevel: 0, stressCauses: [] };
        if(currentMode === prev) updateUI();
        updateChart();
    }
    
    function resetAllModes() {
        modes.normal = { day: 0, height: 0.0, phase: "Dormancy", history: [0], isDead: false, wiltLevel: 0, stressCauses: [] };
        modes.experiment = { day: 0, height: 0.0, phase: "Dormancy", history: [0], isDead: false, wiltLevel: 0, stressCauses: [] };
        updateUI();
        drawSunflower();
        updateChart();
    }

    function changeDay(delta) {
        if (delta > 0) advanceDays(delta);
        else if (delta < 0) {
            if(!confirm("Mundur hari akan menghilangkan pertumbuhan? Sebaiknya pakai reset.")) return;
            else advanceDays(delta);
        }
    }

    // Update tampilan angka & analisis
    function updateUI() {
        let s = modes[currentMode];
        document.getElementById("day").innerText = s.day;
        document.getElementById("height").innerText = s.height.toFixed(1);
        document.getElementById("phase").innerText = s.phase;
        document.getElementById("modeBadge").innerHTML = currentMode === "normal" ? "🌿 Normal" : "🧪 Eksperimen";
        
        // Update status kesehatan
        let statusSpan = document.getElementById("healthStatus");
        let stress = calculateStressLevel(s.height);
        let wilt = s.wiltLevel || 0;
        
        if (s.isDead) {
            statusSpan.className = "status-dead";
            statusSpan.innerHTML = "💀 MATI (stres fatal) 💀";
        } else if (wilt > 60) {
            statusSpan.className = "status-alert";
            statusSpan.innerHTML = `🥀 LAYU PARAH (${Math.floor(wilt)}%) - Segera perbaiki lingkungan!`;
        } else if (wilt > 30) {
            statusSpan.className = "status-warning";
            statusSpan.innerHTML = `🌿 LAYU RINGAN (${Math.floor(wilt)}%) - Perhatikan kondisi`;
        } else if (stress.level > 40) {
            statusSpan.className = "status-warning";
            statusSpan.innerHTML = `⚠️ TERSTRES (${stress.level}%) - Hati-hati!`;
        } else {
            statusSpan.className = "badge";
            statusSpan.innerHTML = "❤️ SEHAT & SUBUR";
        }
        
        // Tampilkan penyebab stres
        let stressDiv = document.getElementById("stressList");
        if (stress.causes.length > 0 && !s.isDead) {
            stressDiv.innerHTML = stress.causes.map(c => `<span class="stress-tag">${c}</span>`).join('');
        } else if (s.isDead) {
            stressDiv.innerHTML = '<span class="stress-tag">💀 Tanaman sudah mati, silakan reset</span>';
        } else {
            stressDiv.innerHTML = '<span style="color:#82b74e;">✅ Kondisi optimal, tanaman sehat</span>';
        }
        
        let treatment = `💧 Air ${env.water} mm | ☀️ ${env.light}% | 🌡️ ${env.temp}°C | pH ${env.ph} | 💨 Kelembaban ${env.humidity}%<br>🧪 Pupuk: ${env.fertilizer} (${env.fertDose}%) | 🍂 Musim: ${env.season}`;
        document.getElementById("treatmentInfo").innerHTML = treatment;
        
        let health = "🌱 Baik";
        let growthRate = s.isDead ? 0 : dailyGrowth(s);
        if (s.isDead) health = "💀 Mati";
        else if (wilt > 60) health = "🥀 Layu parah, segera selamatkan!";
        else if (wilt > 30) health = "🌿 Layu ringan";
        else if (stress.level > 50) health = "⚠️ Stres berat";
        else if (stress.level > 30) health = "⚡ Tertekan";
        else health = "🌻 Sehat & berbunga indah";
        
        let response = `📈 Laju tumbuh: ${growthRate.toFixed(2)} cm/hari<br>❤️ Kondisi: ${health}<br>📏 Tinggi: ${((s.height/MAX_HEIGHT)*100).toFixed(0)}% dari maksimal<br>🥀 Tingkat layu: ${Math.floor(wilt)}%`;
        document.getElementById("plantInfo").innerHTML = response;
        
        // Disable tombol + jika mati (opsional)
        let growBtn = document.getElementById("grow1Btn");
        if (growBtn) growBtn.disabled = s.isDead;
    }
    
    // Gambar bunga dinamis di Canvas dengan efek layu & mati
    function drawSunflower() {
        let canvas = document.getElementById("flowerCanvas");
        let ctx = canvas.getContext("2d");
        let w = canvas.width = 380;
        let h = canvas.height = 280;
        ctx.clearRect(0,0,w,h);
        
        let state = modes[currentMode];
        let heightPercent = Math.min(1.0, state.height / MAX_HEIGHT);
        let stemHeight = 28 + heightPercent * 155;
        stemHeight = Math.min(180, Math.max(18, stemHeight));
        let groundY = h-32;
        let stemTopY = groundY - stemHeight;
        let stemX = w/2;
        
        let wilt = state.wiltLevel || 0;
        let isDead = state.isDead;
        
        // Warna berdasarkan kondisi
        let stemColor = isDead ? "#6b4c3a" : (wilt > 60 ? "#8b6b42" : (wilt > 30 ? "#7a9a42" : "#558b2f"));
        let leafColor = isDead ? "#8b5a3a" : (wilt > 60 ? "#9c7a4a" : (wilt > 30 ? "#8ab84a" : "#6aab3a"));
        let flowerColor = isDead ? "#a08860" : (wilt > 60 ? "#d4a050" : (wilt > 30 ? "#e8b450" : "#f3bc4c"));
        
        // Tanah
        ctx.fillStyle = "#a47242";
        ctx.fillRect(0, groundY-6, w, 38);
        ctx.fillStyle = "#c2894a";
        for (let i=0;i<12;i++) ctx.fillRect(i*35, groundY-8, 20, 6);
        
        // Batang (bisa miring jika layu)
        let tiltX = 0;
        if (wilt > 50) tiltX = 3;
        else if (wilt > 25) tiltX = 1.5;
        
        ctx.fillStyle = stemColor;
        ctx.fillRect(stemX-4 + tiltX, stemTopY, 8, stemHeight);
        
        // Daun (layu = menunduk)
        if(state.height >= 7){
            ctx.fillStyle = leafColor;
            let leafAngle = wilt > 50 ? -1.2 : (wilt > 20 ? -0.9 : -0.7);
            ctx.beginPath(); ctx.ellipse(stemX-14 + tiltX*0.5, stemTopY+stemHeight*0.45, 13, 7, leafAngle, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(stemX+12 + tiltX*0.5, stemTopY+stemHeight*0.6, 13, 7, -leafAngle*0.8, 0, Math.PI*2); ctx.fill();
        }
        
        // Kepala bunga (jika mati: coklat kering)
        let headSize = 12;
        let phaseName = state.phase;
        if(phaseName === "Mati") headSize = 14;
        else if(phaseName === "Dormancy") headSize = 7;
        else if(phaseName === "Germination") headSize = 12;
        else if(phaseName === "Vegetative") headSize = 18;
        else if(phaseName === "Budding") headSize = 26;
        else if(phaseName === "Flowering") headSize = 36;
        else headSize = 40;
        
        if(state.height >= 2.5 && !state.isDead){
            ctx.fillStyle = flowerColor;
            ctx.beginPath(); ctx.arc(stemX + tiltX*0.3, stemTopY-4, headSize, 0, Math.PI*2); ctx.fill();
            
            if(wilt < 70){
                ctx.fillStyle = "#e0a42c";
                for(let a=0;a<12;a++){ let ang = a*Math.PI*2/12; let px = stemX+Math.cos(ang)*(headSize-4) + tiltX*0.2; let py = stemTopY-4+Math.sin(ang)*(headSize-4); ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();}
            }
            
            ctx.fillStyle = isDead ? "#6b4a2a" : (wilt > 60 ? "#9a6a2a" : "#7a521f");
            ctx.beginPath(); ctx.arc(stemX + tiltX*0.2, stemTopY-4, headSize*0.4, 0, Math.PI*2); ctx.fill();
            
            if((phaseName === "Flowering" || phaseName === "Reproductive") && wilt < 60){
                ctx.fillStyle = wilt > 40 ? "#b87a2a" : "#cf9f3a";
                for(let p=0;p<10;p++){ let angleP = p*Math.PI*2/10; let px = stemX+Math.cos(angleP)*(headSize-3); let py = stemTopY-4+Math.sin(angleP)*(headSize-3); ctx.beginPath(); ctx.ellipse(px,py,7,4,angleP,0,Math.PI*2); ctx.fill();}
            }
        } 
        else if(state.isDead) {
            // Bunga mati: coklat kering dan patah
            ctx.fillStyle = "#8b6946";
            ctx.beginPath(); ctx.ellipse(stemX + tiltX*0.5, stemTopY-6, 12, 8, 0.2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#6b4a2e";
            ctx.beginPath(); ctx.ellipse(stemX + tiltX*0.5, stemTopY-6, 8, 5, 0, 0, Math.PI*2); ctx.fill();
            // tetes air mata (efek sedih)
            ctx.fillStyle = "#5a8ec9";
            ctx.beginPath(); ctx.ellipse(stemX-10, stemTopY+10, 2, 4, 0, 0, Math.PI*2); ctx.fill();
        }
        else {
            ctx.fillStyle = "#a5672e";
            ctx.beginPath(); ctx.ellipse(stemX, groundY-12, 10, 5, 0, 0, Math.PI*2); ctx.fill();
        }
        
        // Tambahan efek daun kering jika layu parah
        if(wilt > 70 && !state.isDead){
            ctx.fillStyle = "#c28a4a";
            ctx.beginPath(); ctx.ellipse(stemX-18, stemTopY+stemHeight*0.5, 8, 4, -0.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#c28a4a";
            ctx.beginPath(); ctx.ellipse(stemX+16, stemTopY+stemHeight*0.7, 8, 4, 0.5, 0, Math.PI*2); ctx.fill();
        }
    }
    
    // Chart.js untuk grafik pertumbuhan
    function updateChart() {
        let normalHist = modes.normal.history.slice(-60);
        let expHist = modes.experiment.history.slice(-60);
        let labels = normalHist.map((_, idx) => idx);
        
        if(growthChart) growthChart.destroy();
        let ctx = document.getElementById("growthChart").getContext("2d");
        growthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '🌿 Normal Mode', data: normalHist, borderColor: '#4caf50', backgroundColor: 'rgba(76,175,80,0.1)', tension: 0.3, fill: true },
                    { label: '🧪 Eksperimen Mode', data: expHist, borderColor: '#ff9800', backgroundColor: 'rgba(255,152,0,0.05)', tension: 0.3, fill: true }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw} cm` } } },
                scales: { y: { title: { display: true, text: 'Tinggi (cm)' }, beginAtZero: true, max: MAX_HEIGHT } }
            }
        });
    }
    
    // Bind input slider
    function bindInputs() {
        document.getElementById("water").addEventListener("input", (e) => { env.water = parseInt(e.target.value); document.getElementById("waterVal").innerText = env.water; updateUI(); drawSunflower(); });
        document.getElementById("light").addEventListener("input", (e) => { env.light = parseInt(e.target.value); document.getElementById("lightVal").innerText = env.light; updateUI(); drawSunflower(); });
        document.getElementById("temp").addEventListener("input", (e) => { env.temp = parseInt(e.target.value); document.getElementById("tempVal").innerText = env.temp; updateUI(); drawSunflower(); });
        document.getElementById("ph").addEventListener("input", (e) => { env.ph = parseFloat(e.target.value); document.getElementById("phVal").innerText = env.ph; updateUI(); drawSunflower(); });
        document.getElementById("humidity").addEventListener("input", (e) => { env.humidity = parseInt(e.target.value); document.getElementById("humVal").innerText = env.humidity; updateUI(); drawSunflower(); });
        document.getElementById("fertilizer").addEventListener("change", (e) => { env.fertilizer = e.target.value; updateUI(); drawSunflower(); });
        document.getElementById("fertDose").addEventListener("input", (e) => { env.fertDose = parseInt(e.target.value); document.getElementById("fertVal").innerText = env.fertDose; updateUI(); drawSunflower(); });
        document.getElementById("season").addEventListener("change", (e) => { env.season = e.target.value; updateUI(); drawSunflower(); });
        document.getElementById("mode").addEventListener("change", (e) => { currentMode = e.target.value; updateUI(); drawSunflower(); updateChart(); });
    }
    
    // inisialisasi
    window.onload = () => {
        bindInputs();
        updateUI();
        drawSunflower();
        updateChart();
        setInterval(() => { updateUI(); drawSunflower(); }, 300);
    };
    
    window.changeDay = changeDay;
    window.resetCurrentMode = resetCurrentMode;
    window.resetPreviousMode = resetPreviousMode;
    window.resetAllModes = resetAllModes;
</script>
